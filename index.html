<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; overflow: hidden; cursor: default; }
#ui { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
.stat { font-size: 12px; color: #aaa; }
.stat span { color: #fff; font-weight: 500; }
#ui button { padding: 4px 8px; font-size: 11px; border-radius: 5px; cursor: pointer; transition: all 0.15s; color: #ffffff; border: 1px solid #666; background: #2a2a3a; font-family: sans-serif; }
#ui button:hover { background: #ffffff; border-color: #000; }
.tower-btn { border: 2px solid #aaa !important; }
.tower-btn.selected { border-color: #f0c040 !important; box-shadow: 0 0 0 2px #f0c040; }
#start-btn { background: #0f3460; border-color: #e94560 !important; }
#start-btn:disabled { opacity: 0.4; cursor: default; }
#auto-btn.on { background: #1a2a1a; border-color: #4a8a4a !important; }
#speed-btn.on { background: #2a1a3a; border-color: #7a40aa !important; }
#cursor-tower { position: fixed; pointer-events: none; font-size: 20px; transform: translate(-50%, -50%); display: none; z-index: 999; filter: drop-shadow(0 0 6px rgba(255,150,0,0.8)); }
</style>
</head>
<body>
<div id="ui">
  <div class="stat">❤️ <span id="lives">20</span></div>
  <div class="stat">💰 <span id="gold">150</span></div>
  <div class="stat">🌊 Wave <span id="wave">0</span></div>
  <div class="stat">☠️ <span id="score">0</span></div>
  <button class="tower-btn" id="arrow-btn" onclick="selectMode('arrow')">🏹 Arrow (50g)</button>
  <button class="tower-btn" id="laser-btn" onclick="selectMode('laser')">⚡ Laser (80g)</button>
  <button class="tower-btn" id="inferno-btn" onclick="selectMode('inferno')">🔥 Inferno (150g)</button>
  <button class="tower-btn" id="sell-btn" onclick="selectMode('sell')">💸 Sell</button>
  <button id="auto-btn" onclick="toggleAuto()">⏩ Auto: OFF</button>
  <button id="speed-btn" onclick="toggleSpeed()">▶▶ 1×</button>
  <button id="start-btn" onclick="startWave()">Start Wave ▶</button>
</div>
<canvas id="c"></canvas>
<div id="msg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:500;text-align:center;pointer-events:none;color:#fff;text-shadow:0 0 20px rgba(0,0,0,0.9);display:none;white-space:pre;font-family:sans-serif;"></div>
<div id="cursor-tower"></div>

<div id="upgrade-panel" style="display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:590px; background:#16213e; border:1px solid #0f3460; border-bottom:none; border-radius:8px 8px 0 0; padding:10px 12px 8px; font-family:sans-serif; z-index:500;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
    <span style="color:#f0c040; font-size:13px; font-weight:700; letter-spacing:0.5px;">🏹 Arrow Tower Upgrades</span>
    <button id="upgrade-close-btn" onclick="closeUpgradePanel()" style="background:transparent; border:1px solid #555; color:#aaa; font-size:11px; padding:2px 7px; border-radius:4px; cursor:pointer;">✕ Close</button>
  </div>
  <div id="upgrade-lanes" style="display:flex; gap:8px;"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor-tower');
const CELL = 28;
const GAME_W = 640;
const GAME_H = 400;
const COLS = Math.floor(GAME_W / CELL);
const ROWS = Math.floor(GAME_H / CELL);

canvas.width = GAME_W;
canvas.height = GAME_H;
canvas.style.display = 'block';
canvas.style.margin = '0 auto';

let mode = null;
let towers = [], enemies = [], bullets = [], particles = [];
let lives = 20, gold = 150, wave = 0, score = 0;
let waveActive = false, spawnQueue = [], spawnTimer = 0;
let gameOver = false, path = [], autoWave = false, autoDelay = 0;
let hoverGX = -1, hoverGY = -1;
let doubleSpeed = false;
let tick_count = 0;
let selectedTower = null;

const TOWER_DEFS = {
  arrow:   { cost: 50,  range: 3,     damage: 18, rate: 60, color: '#7ec850', pcolor: '#b0ff70', speed: 7,  type: 'arrow',   icon: '🏹' },
  laser:   { cost: 80,  range: 4.125, damage: 8,  rate: 20, color: '#50c8f0', pcolor: '#80e8ff', speed: 12, type: 'laser',   icon: '⚡' },
  inferno: { cost: 150, range: 3.5,   damage: 0,  rate: 1,  color: '#ff6010', pcolor: '#ff9040', speed: 0,  type: 'inferno', icon: '🔥' }
};

const ARROW_UPGRADES = [
  [ // Lane 0 — Damage / CC
    { name: 'Crippling Shot', cost: 40,  desc: 'Hits slow enemies by 30% for 1.5s' },
    { name: 'Hamstring',      cost: 75,  desc: 'Slowed enemies take +50% damage' },
    { name: 'Execute',        cost: 150, desc: 'Arrows instakill enemies below 20% HP' },
    { name: 'Soul Rend',      cost: 1000, desc: 'Execute at 30% HP; kills fire 3 bonus arrows' },
  ],
  [ // Lane 1 — Utility
    { name: 'Marked Target',       cost: 40,  desc: 'Hits mark enemies — all towers deal +25%' },
    { name: "Tracker's Sight",     cost: 75,  desc: 'Targets highest HP enemy in range' },
    { name: 'Eagle Eye',           cost: 150, desc: 'All arrow towers gain +1 range' },
    { name: 'Curse of Vulnerability', cost: 1000, desc: 'Auto-marks all in range; marked take +75%' },
  ],
  [ // Lane 2 — Support
    { name: 'Watchtower',      cost: 40,  desc: 'Range 3 → 5 tiles' },
    { name: 'Signal Fire',     cost: 75,  desc: 'Kills in range award +2 gold' },
    { name: "Commander's Post",cost: 150, desc: 'Towers within 2 cells fire 20% faster' },
    { name: 'War Beacon',      cost: 1000, desc: 'Aura covers 5 cells, towers fire 35% faster' },
  ],
];

// Returns effective stats for an arrow tower based on its upgrades.
// Never mutates tower.def — called fresh on every shot.
function getTowerStats(tower) {
  if (tower.def.type !== 'arrow') return tower.def;
  const [d, u, s] = tower.upgrades;

  // Lane 2 — Support: range
  let range = s >= 1 ? 5 : 3;

  // Lane 1 — Utility: Eagle Eye adds +1 to ALL arrow towers if any has it
  const eagleEyeActive = towers.some(t => t.def.type === 'arrow' && t.upgrades && t.upgrades[1] >= 3);
  if (eagleEyeActive) range += 1;

  return {
    damage: tower.def.damage,
    rate: tower.def.rate,
    range,
    speed: tower.def.speed,
    pcolor: tower.def.pcolor,
    // Lane 0 — Damage / CC
    appliesSlow:    d >= 1,
    hamstring:      d >= 2,
    execute:        d >= 3,
    executeThresh:  d >= 4 ? 0.30 : 0.20,
    soulRend:       d >= 4,
    // Lane 1 — Utility
    appliesMark:      u >= 1,
    trackerSight:     u >= 2,
    curseOfVuln:      u >= 4,  // tier 4: auto-mark all in range, +75% marked mult
    // Lane 2 — Support
    signalFire:    s >= 2,
    commanderPost: s >= 3,
  };
}

// Returns fire-rate multiplier from a nearby Commander's Post / War Beacon.
function getCommanderBoost(tower) {
  const cx = tower.gx * CELL + CELL / 2, cy = tower.gy * CELL + CELL / 2;
  let best = 1.0;
  for (const t of towers) {
    if (t === tower || t.def.type !== 'arrow' || !t.upgrades || t.upgrades[2] < 3) continue;
    const warBeacon = t.upgrades[2] >= 4;
    const aura = warBeacon ? CELL * 5 : CELL * 2.5;
    const boost = warBeacon ? 0.65 : 0.8;
    const tcx = t.gx * CELL + CELL / 2, tcy = t.gy * CELL + CELL / 2;
    if (dist(cx, cy, tcx, tcy) <= aura) best = Math.min(best, boost);
  }
  return best;
}

function selectMode(m) {
  mode = (mode === m) ? null : m;
  ['arrow','laser','inferno','sell'].forEach(t => {
    const b = document.getElementById(t+'-btn');
    if (b) b.classList.toggle('selected', t === mode);
  });
  updateCursor();
}

function clearMode() {
  mode = null;
  ['arrow','laser','inferno','sell'].forEach(t => {
    const b = document.getElementById(t+'-btn');
    if (b) b.classList.remove('selected');
  });
  updateCursor();
}

function updateCursor() {
  if (mode && TOWER_DEFS[mode]) {
    cursorEl.textContent = TOWER_DEFS[mode].icon;
    cursorEl.style.display = 'block';
    canvas.style.cursor = 'none';
  } else {
    cursorEl.style.display = 'none';
    canvas.style.cursor = mode === 'sell' ? 'crosshair' : 'default';
  }
}

function toggleAuto() {
  autoWave = !autoWave;
  const b = document.getElementById('auto-btn');
  b.textContent = '⏩ Auto: ' + (autoWave ? 'ON' : 'OFF');
  b.classList.toggle('on', autoWave);
  if (autoWave && !waveActive && !gameOver) autoDelay = 60;
}

function toggleSpeed() {
  doubleSpeed = !doubleSpeed;
  const b = document.getElementById('speed-btn');
  b.textContent = doubleSpeed ? '▶▶ 2×' : '▶▶ 1×';
  b.classList.toggle('on', doubleSpeed);
}

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  const rect = canvas.getBoundingClientRect();
  hoverGX = Math.floor((e.clientX - rect.left) / CELL);
  hoverGY = Math.floor((e.clientY - rect.top) / CELL);
});

canvas.addEventListener('mouseleave', () => { hoverGX = -1; hoverGY = -1; });

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (selectedTower) { closeUpgradePanel(); return; }
    clearMode();
  }
});

document.addEventListener('click', e => {
  if (!selectedTower) return;
  const panel = document.getElementById('upgrade-panel');
  if (!panel.contains(e.target) && e.target !== canvas) closeUpgradePanel();
}, true);

function generatePath() {
  path = [];
  let x = 0, y = Math.floor(ROWS * 0.35);
  path.push({x, y});
  const targets = [
    {x: Math.floor(COLS*0.25), y: Math.floor(ROWS*0.35)},
    {x: Math.floor(COLS*0.25), y: Math.floor(ROWS*0.75)},
    {x: Math.floor(COLS*0.6),  y: Math.floor(ROWS*0.75)},
    {x: Math.floor(COLS*0.6),  y: Math.floor(ROWS*0.2)},
    {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.2)},
    {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.6)},
    {x: COLS+1,                y: Math.floor(ROWS*0.6)},
  ];
  for (const t of targets) {
    while (x !== t.x) { x += (t.x > x ? 1 : -1); path.push({x,y}); }
    while (y !== t.y) { y += (t.y > y ? 1 : -1); path.push({x,y}); }
  }
}

function pathSet() {
  const s = new Set();
  path.forEach(p => s.add(p.x+','+p.y));
  return s;
}

function cellCenter(gx, gy) { return { x: gx*CELL+CELL/2, y: gy*CELL+CELL/2 }; }
function towerAt(gx, gy) { return towers.find(t => t.gx===gx && t.gy===gy); }
function dist(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }

canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const gx = Math.floor((e.clientX - rect.left) / CELL);
  const gy = Math.floor((e.clientY - rect.top) / CELL);
  if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) return;
  const ps = pathSet();
  if (ps.has(gx+','+gy)) return;
  const existing = towerAt(gx, gy);

  if (!mode && existing && existing.def.type === 'arrow') {
    selectedTower = selectedTower === existing ? null : existing;
    renderUpgradePanel();
    return;
  }

  if (!mode) { closeUpgradePanel(); return; }

  if (mode === 'sell') {
    if (existing) { gold += Math.floor(existing.def.cost * 0.5); towers = towers.filter(t => t !== existing); if (selectedTower === existing) closeUpgradePanel(); updateUI(); }
    return;
  }
  if (!TOWER_DEFS[mode]) return;
  if (existing) return;
  const def = TOWER_DEFS[mode];
  if (gold < def.cost) return;
  gold -= def.cost;
  towers.push({ gx, gy, def, cooldown: 0, heatTarget: null, heat: 0, upgrades: [0,0,0] });
  updateUI();
  clearMode();
});

function spawnEnemy() {
  const base = 40 + wave * 18;
  const hp = base + Math.floor(Math.random() * base * 0.3);
  enemies.push({ pathIdx: 0, x: path[0].x*CELL+CELL/2, y: path[0].y*CELL+CELL/2, hp, maxHp: hp, speed: 1.1+wave*0.08, baseSpeed: 1.1+wave*0.08, reward: 8+wave*2, size: 7, t: 0, slowTimer: 0, marked: false, markedTimer: 0 });
}

function startWave() {
  if (waveActive || gameOver) return;
  wave++; waveActive = true;
  spawnQueue = Array(5 + wave * 3).fill(0);
  spawnTimer = 0;
  document.getElementById('start-btn').disabled = true;
  updateUI();
}

function updateUI() {
  document.getElementById('lives').textContent = lives;
  document.getElementById('gold').textContent = gold;
  document.getElementById('wave').textContent = wave;
  document.getElementById('score').textContent = score;
  document.getElementById('start-btn').disabled = waveActive;
  if (selectedTower) renderUpgradePanel();
}

function renderUpgradePanel() {
  const panel = document.getElementById('upgrade-panel');
  if (!selectedTower) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  const lanesEl = document.getElementById('upgrade-lanes');
  lanesEl.innerHTML = '';

  const laneNames = ['💀 Damage', '🎯 Utility', '🏰 Support'];
  const laneColors = ['#e94560', '#a855f7', '#50c8f0'];

  ARROW_UPGRADES.forEach((lane, li) => {
    const col = document.createElement('div');
    col.style.cssText = `flex:1; background:#0d1b2a; border:1px solid ${laneColors[li]}44; border-radius:6px; padding:7px;`;

    const header = document.createElement('div');
    header.style.cssText = `color:${laneColors[li]}; font-size:11px; font-weight:700; text-align:center; margin-bottom:6px; letter-spacing:0.5px;`;
    header.textContent = laneNames[li];
    col.appendChild(header);

    const currentTier = selectedTower.upgrades[li];
    lane.forEach((upg, ti) => {
      const purchased = ti < currentTier;
      const isNext = ti === currentTier;
      const locked = ti > currentTier;
      const card = document.createElement('div');
      card.style.cssText = `margin-bottom:5px; padding:5px 7px; border-radius:4px; border:1px solid ${purchased ? laneColors[li]+'88' : locked ? '#333' : '#555'}; background:${purchased ? laneColors[li]+'1a' : '#111827'}; opacity:${locked ? '0.4' : '1'};`;

      const nameEl = document.createElement('div');
      nameEl.style.cssText = `font-size:11px; font-weight:600; color:${purchased ? laneColors[li] : '#ccc'};`;
      nameEl.textContent = (purchased ? '✓ ' : '') + upg.name;
      card.appendChild(nameEl);

      const descEl = document.createElement('div');
      descEl.style.cssText = 'font-size:10px; color:#888; margin-top:2px;';
      descEl.textContent = upg.desc;
      card.appendChild(descEl);

      if (isNext) {
        const btn = document.createElement('button');
        const canAfford = gold >= upg.cost;
        btn.textContent = `Buy ${upg.cost}g`;
        btn.style.cssText = `margin-top:5px; width:100%; padding:3px 0; font-size:10px; background:${canAfford ? laneColors[li]+'33' : '#1a1a1a'}; color:${canAfford ? laneColors[li] : '#555'}; border:1px solid ${canAfford ? laneColors[li] : '#333'}; border-radius:3px; cursor:${canAfford ? 'pointer' : 'default'}; font-family:sans-serif;`;
        if (canAfford) btn.onclick = () => applyUpgrade(li, ti);
        card.appendChild(btn);
      }

      col.appendChild(card);
    });

    lanesEl.appendChild(col);
  });
}

function applyUpgrade(laneIdx, tierIdx) {
  if (!selectedTower) return;
  const upg = ARROW_UPGRADES[laneIdx][tierIdx];
  if (gold < upg.cost || selectedTower.upgrades[laneIdx] !== tierIdx) return;
  gold -= upg.cost;
  selectedTower.upgrades[laneIdx]++;
  updateUI();
}

function closeUpgradePanel() {
  selectedTower = null;
  document.getElementById('upgrade-panel').style.display = 'none';
}

function tick() {
  if (gameOver) return;
  tick_count++;
  if (!waveActive && autoWave) { autoDelay--; if (autoDelay <= 0) startWave(); }
  if (waveActive && spawnQueue.length > 0) { spawnTimer--; if (spawnTimer <= 0) { spawnEnemy(); spawnQueue.pop(); spawnTimer = 55; } }

  for (const e of enemies) {
    if (e.dead) continue;
    // Tick down slow and mark timers
    if (e.slowTimer > 0) { e.slowTimer--; } else { e.slow = false; }
    if (e.markedTimer > 0) { e.markedTimer--; } else { e.marked = false; }

    const spd = e.slow ? e.baseSpeed * 0.7 : e.baseSpeed;
    const target = path[e.pathIdx];
    if (!target) { e.dead = true; lives--; updateUI(); continue; }
    const tx = target.x*CELL+CELL/2, ty = target.y*CELL+CELL/2;
    const d = dist(e.x,e.y,tx,ty);
    if (d < spd+1) { e.pathIdx++; if (e.pathIdx >= path.length) { e.dead = true; lives--; updateUI(); } }
    else { e.x += (tx-e.x)/d*spd; e.y += (ty-e.y)/d*spd; }
    e.t++;
  }

  for (const t of towers) {
    if (t.def.type !== 'inferno') {
      const boost = getCommanderBoost(t);

      if (t.def.type === 'arrow') {
        const eff = getTowerStats(t);
        const c = cellCenter(t.gx, t.gy);

        // Curse of Vulnerability: auto-mark all enemies in range every tick
        if (eff.curseOfVuln) {
          for (const e of enemies) {
            if (!e.dead && e.hp > 0 && dist(c.x, c.y, e.x, e.y) <= eff.range * CELL) {
              e.marked = true; e.markedTimer = 999999; e.markedStrong = true;
            }
          }
        }

        t.cooldown = Math.max(0, t.cooldown - 1);
        if (t.cooldown > 0) continue;

        const inRange = enemies.filter(e => !e.dead && e.hp > 0 && dist(c.x, c.y, e.x, e.y) <= eff.range * CELL);
        if (!inRange.length) { t.cooldown = 0; continue; }

        let best;
        if (eff.trackerSight) {
          best = inRange.reduce((a, b) => b.hp > a.hp ? b : a);
        } else {
          best = inRange.reduce((a, b) => b.pathIdx > a.pathIdx ? b : a);
        }

        // Execute: instakill below threshold HP
        if (eff.execute && best.hp / best.maxHp < eff.executeThresh) {
          const reward = best.reward + (eff.signalFire ? 2 : 0);
          best.dead = true; gold += reward; score++; updateUI();
          for (let i=0;i<6;i++) particles.push({ x:best.x, y:best.y, vx:(Math.random()-.5)*4, vy:(Math.random()-.5)*4, life:20, color:'#f0c040' });
          // Soul Rend: fire 3 bonus arrows at other enemies on execute kill
          if (eff.soulRend) {
            const others = inRange.filter(e => e !== best && !e.dead && e.hp > 0).slice(0, 3);
            for (const ne of others) {
              bullets.push({ x: c.x, y: c.y, target: ne, speed: eff.speed * 1.5, dmg: eff.damage, color: '#ffd700', size: 4, type: 'arrow', appliesSlow: false, appliesMark: false, signalFire: eff.signalFire, soulRend: false, towerRef: t });
            }
          }
          t.cooldown = Math.round(eff.rate * boost);
          continue;
        }

        const markedMult = best.marked ? (best.markedStrong ? 1.75 : 1.25) : 1;
        let dmg = eff.damage;
        if (eff.hamstring && best.slow) dmg = Math.round(dmg * 1.5);
        dmg = Math.round(dmg * markedMult);

        bullets.push({
          x: c.x, y: c.y, target: best,
          speed: eff.speed, dmg, color: eff.pcolor, size: 3, type: 'arrow',
          appliesSlow: eff.appliesSlow,
          appliesMark: eff.appliesMark,
          signalFire: eff.signalFire,
          soulRend: eff.soulRend,
          towerRef: t,
        });
        t.cooldown = Math.round(eff.rate * boost);
      } else {
        // Laser tower — apply commander boost to rate
        t.cooldown = Math.max(0, t.cooldown - 1);
        if (t.cooldown > 0) continue;
        const c = cellCenter(t.gx, t.gy);
        let best = null, bestIdx = -1;
        for (const e of enemies) {
          if (e.dead || e.hp <= 0) continue;
          if (dist(c.x,c.y,e.x,e.y) <= t.def.range*CELL && e.pathIdx > bestIdx) { best = e; bestIdx = e.pathIdx; }
        }
        if (best) {
          let dmg = t.def.damage;
          if (best.marked) dmg = Math.round(dmg * (best.markedStrong ? 1.75 : 1.25));
          t.cooldown = Math.round(t.def.rate * boost);
          bullets.push({ x: c.x, y: c.y, target: best, speed: t.def.speed, dmg, color: t.def.pcolor, size: 2, type: 'laser', appliesSlow: false, appliesMark: false, signalFire: false, soulRend: false, towerRef: null });
        }
      }
    } else {
      // Inferno tower: beam logic
      const c = cellCenter(t.gx, t.gy);
      const range = t.def.range * CELL;
      let best = null, bestIdx = -1;
      for (const e of enemies) {
        if (e.dead || e.hp <= 0) continue;
        if (dist(c.x,c.y,e.x,e.y) <= range && e.pathIdx > bestIdx) { best = e; bestIdx = e.pathIdx; }
      }
      if (best) {
        if (t.heatTarget !== best) { t.heat = 0; t.heatTarget = best; }
        t.heat = Math.min(t.heat + 1, 180);
        let dmgPerTick = 0.3 + (t.heat / 180) * 4;
        if (best.marked) dmgPerTick *= 1.25;
        best.hp -= dmgPerTick;
        best.onFire = t.heat;
        if (tick_count % 3 === 0) {
          const frac = Math.random();
          const px = c.x + (best.x - c.x) * frac;
          const py = c.y + (best.y - c.y) * frac;
          const heat01 = t.heat / 180;
          const r = Math.round(255);
          const g = Math.round(200 * (1 - heat01));
          particles.push({ x: px + (Math.random()-.5)*4, y: py + (Math.random()-.5)*4, vx: (Math.random()-.5)*1.5, vy: -Math.random()*2, life: 8 + Math.random()*6, color: `rgb(${r},${g},0)` });
        }
        if (best.hp <= 0) { best.dead=true; gold+=best.reward; score++; updateUI(); t.heat=0; t.heatTarget=null; }
        t.beamTarget = best;
      } else {
        t.heat = Math.max(0, t.heat - 3);
        t.beamTarget = null;
        if (t.heatTarget) t.heatTarget = null;
      }
    }
  }

  for (const b of bullets) {
    if (b.done) continue;
    if (b.target.dead || b.target.hp <= 0) { b.done = true; continue; }
    const tx = b.target.x, ty = b.target.y;
    const d = dist(b.x,b.y,tx,ty);
    if (d < b.speed+2) {
      b.target.hp -= b.dmg;
      for (let i=0;i<4;i++) particles.push({ x:tx, y:ty, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:15, color:b.color });

      if (b.appliesSlow) { b.target.slow = true; b.target.slowTimer = 90; }
      if (b.appliesMark) { b.target.marked = true; b.target.markedTimer = 180; }

      if (b.target.hp <= 0) {
        b.target.dead = true;
        gold += b.target.reward + (b.signalFire ? 2 : 0);
        score++; updateUI();
        // Soul Rend: on any kill, fire 3 bonus arrows at nearby enemies
        if (b.soulRend && b.towerRef) {
          const t = b.towerRef;
          const eff = getTowerStats(t);
          const c = cellCenter(t.gx, t.gy);
          const others = enemies.filter(e => !e.dead && e.hp > 0 && dist(c.x, c.y, e.x, e.y) <= eff.range * CELL).slice(0, 3);
          for (const ne of others) {
            bullets.push({ x: tx, y: ty, target: ne, speed: eff.speed * 1.5, dmg: eff.damage, color: '#ffd700', size: 4, type: 'arrow', appliesSlow: false, appliesMark: false, signalFire: eff.signalFire, soulRend: false, towerRef: null });
          }
        }
      }
      b.done = true;
    } else { b.x+=(tx-b.x)/d*b.speed; b.y+=(ty-b.y)/d*b.speed; }
  }

  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });
  bullets = bullets.filter(b => !b.done);
  enemies = enemies.filter(e => !e.dead && e.hp>0);

  if (waveActive && spawnQueue.length===0 && enemies.length===0) {
    waveActive = false; gold += 20+wave*5; updateUI();
    document.getElementById('start-btn').disabled = false;
    showMsg('Wave '+wave+' clear! +'+(20+wave*5)+'g', 1800);
    if (autoWave) autoDelay = 180;
  }

  if (lives <= 0) {
    gameOver = true; clearMode();
    showMsg('💀 Game Over!\nWave '+wave+' • '+score+' kills\n\nRefresh to restart', 0);
  }
}

function showMsg(text, dur) {
  const m = document.getElementById('msg');
  m.textContent = text; m.style.display = 'block';
  if (dur > 0) setTimeout(() => m.style.display='none', dur);
}

function drawBeam(x1, y1, x2, y2, heat) {
  const heat01 = heat / 180;
  const coreW = 1 + heat01 * 3;
  const glowW = 4 + heat01 * 10;
  const r = 255;
  const g = Math.round(180 * (1 - heat01));

  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${g},0,${0.15 + heat01*0.2})`;
  ctx.lineWidth = glowW; ctx.stroke();

  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${Math.round(g*0.6)},0,${0.5 + heat01*0.3})`;
  ctx.lineWidth = coreW * 2; ctx.stroke();

  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${200+Math.round(55*heat01)},${Math.round(200*heat01)},${0.7+heat01*0.3})`;
  ctx.lineWidth = coreW; ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  const ps = pathSet();

  for (let gy=0; gy<ROWS; gy++) {
    for (let gx=0; gx<COLS; gx++) {
      const isPath = ps.has(gx+','+gy);
      const isHover = gx===hoverGX && gy===hoverGY && !isPath && mode && TOWER_DEFS[mode];
      const def = mode ? TOWER_DEFS[mode] : null;
      const canPlace = isHover && def && gold >= def.cost && !towerAt(gx,gy);
      ctx.fillStyle = isPath ? '#2a2010' : isHover ? (canPlace ? 'rgba(80,180,80,0.25)' : 'rgba(180,60,60,0.25)') : '#0d1b2a';
      ctx.fillRect(gx*CELL, gy*CELL, CELL-1, CELL-1);
    }
  }

  for (let i=1; i<path.length-1; i++) {
    const p = path[i];
    ctx.fillStyle = '#3a3010';
    ctx.fillRect(p.x*CELL+1, p.y*CELL+1, CELL-3, CELL-3);
  }

  if (path.length) {
    const s = path[0];
    ctx.fillStyle = '#2a5a2a'; ctx.fillRect(s.x*CELL, s.y*CELL, CELL-1, CELL-1);
    ctx.font = '12px sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='#7ec850'; ctx.fillText('▶', s.x*CELL+CELL/2, s.y*CELL+CELL/2+4);
    const e2 = path[path.length-1];
    ctx.fillStyle='#5a2a2a'; ctx.fillRect(e2.x*CELL, e2.y*CELL, CELL-1, CELL-1);
    ctx.fillText('🏰', e2.x*CELL+CELL/2, e2.y*CELL+CELL/2+4);
  }

  for (const t of towers) {
    if (t.def.type === 'inferno' && t.beamTarget && t.heat > 0) {
      const c = cellCenter(t.gx, t.gy);
      drawBeam(c.x, c.y, t.beamTarget.x, t.beamTarget.y, t.heat);
    }
  }

  // Commander's Post / War Beacon aura rings
  for (const t of towers) {
    if (t.def.type === 'arrow' && t.upgrades && t.upgrades[2] >= 3) {
      const cx = t.gx*CELL+CELL/2, cy = t.gy*CELL+CELL/2;
      const warBeacon = t.upgrades[2] >= 4;
      const aura = warBeacon ? CELL * 5 : CELL * 2.5;
      ctx.beginPath(); ctx.arc(cx, cy, aura, 0, Math.PI*2);
      ctx.strokeStyle = warBeacon ? 'rgba(255,200,50,0.35)' : 'rgba(80,200,255,0.2)';
      ctx.lineWidth = warBeacon ? 1.5 : 1;
      ctx.setLineDash([3,4]); ctx.stroke(); ctx.setLineDash([]);
    }
  }

  for (const t of towers) {
    const cx = t.gx*CELL+CELL/2, cy = t.gy*CELL+CELL/2;
    ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(t.gx*CELL+2, t.gy*CELL+2, CELL-5, CELL-5, 3);
    ctx.fill(); ctx.stroke();
    if (t.def.type === 'inferno' && t.heat > 0) {
      const h01 = t.heat/180;
      ctx.strokeStyle = `rgba(255,${Math.round(150*(1-h01))},0,${0.5+h01*0.5})`;
      ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t.def.icon, cx, cy+5);
  }

  // Selected tower highlight and range ring
  if (selectedTower) {
    const eff = getTowerStats(selectedTower);
    const cx = selectedTower.gx*CELL+CELL/2, cy = selectedTower.gy*CELL+CELL/2;
    ctx.beginPath(); ctx.arc(cx, cy, eff.range*CELL, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(240,192,64,0.05)'; ctx.fill();
    ctx.strokeStyle = 'rgba(240,192,64,0.6)';
    ctx.lineWidth = 1.5; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle = '#f0c040'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(selectedTower.gx*CELL+2, selectedTower.gy*CELL+2, CELL-5, CELL-5, 3);
    ctx.stroke();
  }

  // Range preview on hover
  if (mode && TOWER_DEFS[mode] && hoverGX >= 0 && hoverGY >= 0) {
    const def = TOWER_DEFS[mode];
    const ps2 = pathSet();
    const canPlace = !ps2.has(hoverGX+','+hoverGY) && !towerAt(hoverGX,hoverGY) && gold >= def.cost;
    const cx = hoverGX*CELL+CELL/2, cy = hoverGY*CELL+CELL/2;
    ctx.beginPath(); ctx.arc(cx, cy, def.range*CELL, 0, Math.PI*2);
    ctx.fillStyle = canPlace ? 'rgba(255,255,255,0.04)' : 'rgba(255,80,80,0.04)'; ctx.fill();
    ctx.strokeStyle = canPlace
      ? (mode==='inferno' ? 'rgba(255,120,0,0.6)' : 'rgba(255,255,255,0.5)')
      : 'rgba(255,80,80,0.5)';
    ctx.lineWidth = 1; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  }

  for (const e of enemies) {
    const r=e.size, hpPct=e.hp/e.maxHp, pulse=0.85+0.15*Math.sin(e.t*0.15);
    const fireAmt = e.onFire ? Math.min(e.onFire/180, 1) : 0;
    const baseR = Math.round(220*(1-hpPct)+40*hpPct);
    const baseG = Math.round(60*hpPct+20);
    const baseB = Math.round(180*hpPct+40);
    const er = Math.round(baseR*(1-fireAmt) + 255*fireAmt);
    const eg = Math.round(baseG*(1-fireAmt) + 80*fireAmt);
    const eb = Math.round(baseB*(1-fireAmt));
    ctx.fillStyle=`rgba(${er},${eg},${eb},0.95)`;
    ctx.beginPath(); ctx.arc(e.x,e.y,r*pulse,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,255,255,0.4)';
    ctx.lineWidth=1+fireAmt; ctx.stroke();
    e.onFire = 0;

    // Slow visual: blue tint ring
    if (e.slow) {
      ctx.beginPath(); ctx.arc(e.x, e.y, r*pulse+2, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(100,180,255,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    // Marked visual: purple ring (bright gold if Curse of Vulnerability)
    if (e.marked) {
      ctx.beginPath(); ctx.arc(e.x, e.y, r*pulse+3, 0, Math.PI*2);
      ctx.strokeStyle = e.markedStrong ? 'rgba(255,180,0,0.9)' : 'rgba(168,85,247,0.7)';
      ctx.lineWidth = e.markedStrong ? 2 : 1.5; ctx.stroke();
    }

    const bw=r*2.2;
    ctx.fillStyle='#333'; ctx.fillRect(e.x-bw/2, e.y-r-6, bw, 3);
    ctx.fillStyle=hpPct>0.5?'#7ec850':hpPct>0.25?'#f0c040':'#e94560';
    ctx.fillRect(e.x-bw/2, e.y-r-6, bw*hpPct, 3);
  }

  for (const b of bullets) {
    ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.size,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  for (const p of particles) {
    ctx.globalAlpha=p.life/15; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loop() {
  tick();
  if (doubleSpeed) tick();
  draw();
  requestAnimationFrame(loop);
}

generatePath();
updateUI();

document.querySelectorAll('#ui button').forEach(btn => {
  btn.style.setProperty('color', '#ffffff', 'important');
  btn.addEventListener('mouseenter', () => btn.style.setProperty('color', '#000000', 'important'));
  btn.addEventListener('mouseleave', () => btn.style.setProperty('color', '#ffffff', 'important'));
});

loop();
showMsg('New: 🔥 Inferno tower!\nBeam heats up — hold fire to maximize damage.', 3000);
</script>
</body>
</html>
