<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; overflow: hidden; cursor: default; }
#ui { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 6px 10px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
.stat { font-size: 12px; color: #aaa; }
.stat span { color: #fff; font-weight: 500; }
#ui button, #tower-menu button, #action-menu button, #tower-context-menu button { padding: 4px 8px; font-size: 11px; border-radius: 5px; cursor: pointer; transition: all 0.15s; color: #ffffff; border: 1px solid #666; background: #2a2a3a; font-family: sans-serif; }
#ui button:hover, #tower-menu button:hover, #action-menu button:hover, #tower-context-menu button:hover { background: #ffffff; border-color: #000; }
.tower-btn { border: 2px solid #aaa !important; }
.tower-btn.selected { border-color: #f0c040 !important; box-shadow: 0 0 0 2px #f0c040; }
#start-btn { background: #0f3460; border-color: #e94560 !important; }
#start-btn:disabled { opacity: 0.4; cursor: default; }
#auto-btn.on { background: #1a2a1a; border-color: #4a8a4a !important; }
#speed-btn.on { background: #2a1a3a; border-color: #7a40aa !important; }
#cursor-tower { position: fixed; pointer-events: none; font-size: 20px; transform: translate(-50%, -50%); display: none; z-index: 999; filter: drop-shadow(0 0 6px rgba(255,150,0,0.8)); }
#tower-menu { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 500; display: flex; align-items: stretch; overflow: hidden; background: #16213e; border: 1px solid #0f3460; border-left: none; border-radius: 0 8px 8px 0; }
#tower-menu-content { max-width: 0; overflow: hidden; display: flex; flex-direction: column; gap: 10px; justify-content: center; transition: max-width 0.25s ease, padding 0.25s ease; padding: 10px 0; }
#tower-menu.open #tower-menu-content { max-width: 160px; padding: 10px; }
#tower-menu-handle { writing-mode: vertical-rl; padding: 16px 6px; font-size: 12px; border: none; background: #0f3460; color: #fff; cursor: pointer; font-family: sans-serif; }
#tower-menu-handle:hover { background: #14407a; }
#action-menu { position: fixed; right: 0; bottom: 0; z-index: 500; display: flex; gap: 8px; padding: 8px 10px; background: #16213e; border-top: 1px solid #0f3460; border-left: 1px solid #0f3460; }
#tower-context-menu { display: none; position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); z-index: 700; flex-direction: column; gap: 8px; padding: 10px 12px; background: #16213e; border: 1px solid #0f3460; border-bottom: none; border-radius: 8px 8px 0 0; min-width: 260px; }
#ctx-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
#ctx-tower-icon { width: 30px; height: 30px; flex: none; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #ffffff; border: 1.5px solid #000000; border-radius: 4px; }
#ctx-paths { display: flex; flex-direction: column; gap: 5px; }
.ctx-path-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ctx-path-label { font-size: 11px; color: #aaa; white-space: nowrap; }
.ctx-path-label .lvl { color: #f0c040; font-weight: 600; }
.ctx-path-btn { flex: none; min-width: 92px; }
.ctx-path-locked { opacity: 0.45; }
#ui button:disabled, #tower-menu button:disabled, #action-menu button:disabled, #tower-context-menu button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div id="ui">
  <div class="stat">❤️ <span id="lives">20</span></div>
  <div class="stat">💰 <span id="gold">150</span></div>
  <div class="stat">🌊 Wave <span id="wave">0</span></div>
  <div class="stat">☠️ <span id="score">0</span></div>
</div>
<canvas id="c"></canvas>
<div id="msg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:500;text-align:center;pointer-events:none;color:#fff;text-shadow:0 0 20px rgba(0,0,0,0.9);display:none;white-space:pre;font-family:sans-serif;"></div>
<div id="cursor-tower"></div>
<div id="tower-menu">
  <button id="tower-menu-handle" onclick="toggleTowerMenu()">🏗️ Towers ▶</button>
  <div id="tower-menu-content">
    <button class="tower-btn" id="arrow-btn" onclick="selectMode('arrow')">🏹 Arrow (50g)</button>
    <button class="tower-btn" id="laser-btn" onclick="selectMode('laser')">⚡ Laser (80g)</button>
    <button class="tower-btn" id="inferno-btn" onclick="selectMode('inferno')">🔥 Inferno (150g)</button>
  </div>
</div>
<div id="action-menu">
  <button id="auto-btn" onclick="toggleAuto()">⏩ Auto: OFF</button>
  <button id="speed-btn" onclick="toggleSpeed()">▶▶ 1×</button>
  <button id="start-btn" onclick="startWave()">Start Wave ▶</button>
</div>
<div id="tower-context-menu">
  <div id="ctx-header">
    <div id="ctx-tower-icon"></div>
    <button id="ctx-sell-btn" onclick="ctxSell()">💸 Sell</button>
  </div>
  <div id="ctx-paths">
    <div class="ctx-path-row" data-slot="0">
      <span class="ctx-path-label"></span>
      <button class="ctx-path-btn" onclick="ctxPathUpgrade(0)"></button>
    </div>
    <div class="ctx-path-row" data-slot="1">
      <span class="ctx-path-label"></span>
      <button class="ctx-path-btn" onclick="ctxPathUpgrade(1)"></button>
    </div>
    <div class="ctx-path-row" data-slot="2">
      <span class="ctx-path-label"></span>
      <button class="ctx-path-btn" onclick="ctxPathUpgrade(2)"></button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor-tower');
const CELL = 28;
const GAME_W = 640;
const GAME_H = 400;
const COLS = Math.floor(GAME_W / CELL);
const ROWS = Math.floor(GAME_H / CELL);

canvas.width = GAME_W;
canvas.height = GAME_H;
canvas.style.display = 'block';
canvas.style.margin = '0 auto';

let mode = null;
let towers = [], enemies = [], bullets = [], particles = [];
let lives = 20, gold = 150, wave = 0, score = 0;
let waveActive = false, spawnQueue = [], spawnTimer = 0;
let gameOver = false, path = [], autoWave = false, autoDelay = 0;
let hoverGX = -1, hoverGY = -1;
let doubleSpeed = false;
let tick_count = 0;

const MAX_PATH_LEVEL = 5;
const CROSSPATH_CAP = 2; // at most one path may exceed this tier at a time

const TOWER_DEFS = {
  arrow:   { cost: 50,  range: 3,     damage: 75, rate: 60, color: '#7ec850', pcolor: '#b0ff70', speed: 7,  type: 'arrow',   icon: '🏹', canTargetAir: false },
  laser:   { cost: 80,  range: 4.125, damage: 20, rate: 20, color: '#50c8f0', pcolor: '#80e8ff', speed: 12, type: 'laser',   icon: '⚡', canTargetAir: false },
  inferno: { cost: 150, range: 3.5,   damage: 0,  rate: 1,  color: '#ff6010', pcolor: '#ff9040', speed: 0,  type: 'inferno', icon: '🔥', canTargetAir: true },
};

// Each tier entry is the tower's stat state AT that tier (not a delta). Tier index 0 = path level 1.
const PATH_KEYS = {
  arrow:   ['power', 'speed', 'utility'],
  laser:   ['power', 'speed', 'utility'],
  inferno: ['power', 'heat',  'utility'],
};

const PATH_META = {
  power:   { icon: '💪', name: 'Power' },
  speed:   { icon: '⚡', name: 'Speed' },
  heat:    { icon: '🥶', name: 'Heat' },
  utility: { icon: '🎯', name: 'Utility' },
};

const PATH_DEFS = {
  arrow: {
    power: [
      { cost: 45,  dmgMult: 1.20 },
      { cost: 75,  dmgMult: 1.40 },
      { cost: 135, dmgMult: 1.65 },
      { cost: 210, dmgMult: 1.95 },
      { cost: 300, dmgMult: 2.40, crit: 0.20, critMult: 2 },
    ],
    speed: [
      { cost: 45,  rateMult: 0.90 },
      { cost: 75,  rateMult: 0.80 },
      { cost: 135, rateMult: 0.68 },
      { cost: 210, rateMult: 0.55 },
      { cost: 300, rateMult: 0.42, multishot: 2 },
    ],
    utility: [
      { cost: 40,  rangeAdd: 0.5 },
      { cost: 70,  rangeAdd: 0.75, unlockAA: true },
      { cost: 120, rangeAdd: 1.0 },
      { cost: 180, rangeAdd: 1.25 },
      { cost: 270, rangeAdd: 1.5, pierce: 1 },
    ],
  },
  laser: {
    power: [
      { cost: 60,  dmgMult: 1.20 },
      { cost: 100, dmgMult: 1.40 },
      { cost: 165, dmgMult: 1.65 },
      { cost: 255, dmgMult: 1.95 },
      { cost: 360, dmgMult: 2.40, overcharge: 0.20, overchargeMult: 2.0 },
    ],
    speed: [
      { cost: 60,  rateMult: 0.88 },
      { cost: 100, rateMult: 0.76 },
      { cost: 165, rateMult: 0.62 },
      { cost: 255, rateMult: 0.46 },
      { cost: 360, rateMult: 0.30 },
    ],
    utility: [
      { cost: 55,  rangeAdd: 0.4 },
      { cost: 85,  rangeAdd: 0.6, unlockAA: true },
      { cost: 145, rangeAdd: 0.8 },
      { cost: 225, rangeAdd: 1.0 },
      { cost: 315, rangeAdd: 1.2, chain: 0.5 },
    ],
  },
  inferno: {
    power: [
      { cost: 90,  dmgMult: 1.2 },
      { cost: 150, dmgMult: 1.45 },
      { cost: 240, dmgMult: 1.75 },
      { cost: 345, dmgMult: 2.1 },
      { cost: 480, dmgMult: 2.5 },
    ],
    heat: [
      { cost: 90,  heatRate: 1.15 },
      { cost: 150, heatRate: 1.35 },
      { cost: 240, heatRate: 1.6 },
      { cost: 345, heatRate: 1.9 },
      { cost: 480, heatRate: 2.2, cryo: true },
    ],
    utility: [
      { cost: 75,  rangeAdd: 0.25 },
      { cost: 130, rangeAdd: 0.5 },
      { cost: 210, rangeAdd: 0.75 },
      { cost: 300, rangeAdd: 1.0 },
      { cost: 420, rangeAdd: 1.25, splash: 0.3 },
    ],
  },
};

function newTowerPaths(type) {
  const paths = {};
  PATH_KEYS[type].forEach(k => paths[k] = 0);
  return paths;
}

// Effective stats/mechanics for a tower, combining its base def with whatever
// tier each of its 3 paths has reached (only the highest reached tier per path applies).
function towerStats(t) {
  const stats = Object.assign({ dmgMult: 1, rateMult: 1, rangeAdd: 0, heatRate: 1 }, t.def);
  for (const key of PATH_KEYS[t.def.type]) {
    const level = t.paths[key];
    // Merge every tier up through the current one — numeric stats are overwritten by
    // the latest (highest) tier, while one-time unlock flags (e.g. unlockAA) persist
    // once granted even if a later tier's entry doesn't repeat them.
    for (let i = 0; i < level; i++) Object.assign(stats, PATH_DEFS[t.def.type][key][i]);
  }
  stats.damage = t.def.damage * stats.dmgMult;
  stats.rate = Math.max(1, Math.round(t.def.rate * stats.rateMult));
  stats.range = t.def.range + stats.rangeAdd;
  return stats;
}

function canTargetAir(t) {
  return t.def.canTargetAir || !!towerStats(t).unlockAA;
}

// Whether a given path can still be leveled up on this tower, given the crosspathing rules:
//  - A tower may only ever have levels in 2 of its 3 paths. Once 2 paths have at least
//    1 level, the untouched 3rd path locks and can never be started. This is independent
//    of tier — you can start a 2nd path any time, even after the 1st is already deep in.
//  - A path already at the cap (tier 2) can't go past it once some OTHER path has
//    exceeded the cap — but paths still below the cap remain free to climb up to it
//    regardless of what any other path is doing.
function canLevelPath(t, key) {
  const level = t.paths[key];
  if (level >= MAX_PATH_LEVEL) return false;
  const others = PATH_KEYS[t.def.type].filter(k => k !== key);
  if (level === 0 && others.filter(k => t.paths[k] > 0).length >= 2) return false;
  if (level >= CROSSPATH_CAP && others.some(k => t.paths[k] > CROSSPATH_CAP)) return false;
  return true;
}

function selectMode(m) {
  if (gold < TOWER_DEFS[m].cost) return;
  mode = (mode === m) ? null : m;
  ['arrow','laser','inferno'].forEach(t => {
    const b = document.getElementById(t+'-btn');
    if (b) b.classList.toggle('selected', t === mode);
  });
  updateCursor();
  setTowerMenuOpen(false);
  hideTowerContext();
}

let towerMenuOpen = false;
function setTowerMenuOpen(open) {
  towerMenuOpen = open;
  document.getElementById('tower-menu').classList.toggle('open', open);
  document.getElementById('tower-menu-handle').textContent = '🏗️ Towers ' + (open ? '◀' : '▶');
}
function toggleTowerMenu() { setTowerMenuOpen(!towerMenuOpen); }

function clearMode() {
  mode = null;
  ['arrow','laser','inferno'].forEach(t => {
    const b = document.getElementById(t+'-btn');
    if (b) b.classList.remove('selected');
  });
  updateCursor();
}

function updateCursor() {
  if (mode && TOWER_DEFS[mode]) {
    cursorEl.textContent = TOWER_DEFS[mode].icon;
    cursorEl.style.display = 'block';
    canvas.style.cursor = 'none';
  } else {
    cursorEl.style.display = 'none';
    canvas.style.cursor = 'default';
  }
}

let ctxTower = null;
function showTowerContext(tower) {
  ctxTower = tower;
  document.getElementById('ctx-tower-icon').textContent = tower.def.icon;
  updateCtxPaths();
  document.getElementById('tower-context-menu').style.display = 'flex';
}

function updateCtxPaths() {
  if (!ctxTower) return;
  const type = ctxTower.def.type;
  const keys = PATH_KEYS[type];
  document.querySelectorAll('.ctx-path-row').forEach((row, i) => {
    const key = keys[i];
    const meta = PATH_META[key];
    const level = ctxTower.paths[key];
    const label = row.querySelector('.ctx-path-label');
    const btn = row.querySelector('.ctx-path-btn');
    label.innerHTML = meta.icon + ' ' + meta.name + ' <span class="lvl">' + level + '/' + MAX_PATH_LEVEL + '</span>';
    if (level >= MAX_PATH_LEVEL) {
      btn.disabled = true;
      btn.textContent = 'Maxed';
      row.classList.remove('ctx-path-locked');
    } else if (!canLevelPath(ctxTower, key)) {
      btn.disabled = true;
      btn.textContent = 'Locked';
      row.classList.add('ctx-path-locked');
    } else {
      const next = PATH_DEFS[type][key][level];
      btn.disabled = gold < next.cost;
      btn.textContent = 'Upgrade (' + next.cost + 'g)';
      row.classList.remove('ctx-path-locked');
    }
  });
}

function hideTowerContext() {
  ctxTower = null;
  document.getElementById('tower-context-menu').style.display = 'none';
}

function ctxPathUpgrade(slot) {
  if (!ctxTower) return;
  const key = PATH_KEYS[ctxTower.def.type][slot];
  if (!canLevelPath(ctxTower, key)) return;
  const next = PATH_DEFS[ctxTower.def.type][key][ctxTower.paths[key]];
  if (gold < next.cost) { showMsg('Not enough gold', 1000); return; }
  gold -= next.cost;
  ctxTower.invested += next.cost;
  ctxTower.paths[key]++;
  updateUI();
  showMsg(ctxTower.def.icon + ' ' + PATH_META[key].name + ' Lv' + ctxTower.paths[key] + '!', 1200);
  updateCtxPaths();
}

function ctxSell() {
  if (!ctxTower) return;
  gold += Math.floor(ctxTower.invested * 0.5);
  towers = towers.filter(t => t !== ctxTower);
  updateUI();
  hideTowerContext();
}

function toggleAuto() {
  autoWave = !autoWave;
  const b = document.getElementById('auto-btn');
  b.textContent = '⏩ Auto: ' + (autoWave ? 'ON' : 'OFF');
  b.classList.toggle('on', autoWave);
  if (autoWave && !waveActive && !gameOver) autoDelay = 60;
}

function toggleSpeed() {
  doubleSpeed = !doubleSpeed;
  const b = document.getElementById('speed-btn');
  b.textContent = doubleSpeed ? '▶▶ 2×' : '▶▶ 1×';
  b.classList.toggle('on', doubleSpeed);
}

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top = e.clientY + 'px';
  const rect = canvas.getBoundingClientRect();
  hoverGX = Math.floor((e.clientX - rect.left) / CELL);
  hoverGY = Math.floor((e.clientY - rect.top) / CELL);
});

canvas.addEventListener('mouseleave', () => { hoverGX = -1; hoverGY = -1; });

function generatePath() {
  path = [];
  let x = 0, y = Math.floor(ROWS * 0.35);
  path.push({x, y});
  const targets = [
    {x: Math.floor(COLS*0.25), y: Math.floor(ROWS*0.35)},
    {x: Math.floor(COLS*0.25), y: Math.floor(ROWS*0.75)},
    {x: Math.floor(COLS*0.6),  y: Math.floor(ROWS*0.75)},
    {x: Math.floor(COLS*0.6),  y: Math.floor(ROWS*0.2)},
    {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.2)},
    {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.6)},
    {x: COLS+1,                y: Math.floor(ROWS*0.6)},
  ];
  for (const t of targets) {
    while (x !== t.x) { x += (t.x > x ? 1 : -1); path.push({x,y}); }
    while (y !== t.y) { y += (t.y > y ? 1 : -1); path.push({x,y}); }
  }
}

function pathSet() {
  const s = new Set();
  path.forEach(p => s.add(p.x+','+p.y));
  return s;
}

function cellCenter(gx, gy) { return { x: gx*CELL+CELL/2, y: gy*CELL+CELL/2 }; }
function towerAt(gx, gy) { return towers.find(t => t.gx===gx && t.gy===gy); }
function dist(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }

canvas.addEventListener('click', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const gx = Math.floor((e.clientX - rect.left) / CELL);
  const gy = Math.floor((e.clientY - rect.top) / CELL);
  if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) { hideTowerContext(); return; }
  const ps = pathSet();
  const existing = towerAt(gx, gy);

  if (mode && TOWER_DEFS[mode]) {
    if (ps.has(gx+','+gy) || existing) return;
    const def = TOWER_DEFS[mode];
    if (gold < def.cost) { showMsg('Insufficient funds', 1000); return; }
    gold -= def.cost;
    towers.push({ gx, gy, def, cooldown: 0, heatTarget: null, heat: 0, paths: newTowerPaths(mode), invested: def.cost });
    updateUI();
    clearMode();
    return;
  }

  if (existing) {
    if (ctxTower === existing) hideTowerContext();
    else showTowerContext(existing);
  } else {
    hideTowerContext();
  }
});

function enemyStats(type) {
  if (type === 'boss') return { hp: 500, speed: 0.55 + wave * 0.03, reward: 150, size: 13 };
  if (type === 'trojan') return { hp: wave >= 5 ? 200 : 150, speed: 0.85 + wave * 0.05, reward: 25, size: 10 };
  if (type === 'air') return { hp: 125, speed: 1.7 + wave * 0.07, reward: 15, size: 6 };
  return { hp: 100, speed: 1.1 + wave * 0.08, reward: 5, size: 7 };
}

function spawnEnemy(type) {
  const s = enemyStats(type);
  enemies.push({
    flying: type === 'air', trojan: type === 'trojan', boss: type === 'boss',
    pathIdx: 0, x: path[0].x*CELL+CELL/2, y: path[0].y*CELL+CELL/2,
    hp: s.hp, maxHp: s.hp, speed: s.speed, reward: s.reward, size: s.size, t: 0
  });
}

function hatch(e, types, radius, particleColor) {
  types.forEach((type, i) => {
    const s = enemyStats(type);
    const ang = (Math.PI * 2 / types.length) * i;
    enemies.push({
      flying: false, trojan: type === 'trojan', boss: false, pathIdx: e.pathIdx,
      x: e.x + Math.cos(ang) * radius, y: e.y + Math.sin(ang) * radius,
      hp: s.hp, maxHp: s.hp, speed: s.speed, reward: s.reward, size: s.size, t: 0
    });
  });
  for (let i = 0; i < 14; i++) {
    particles.push({ x: e.x, y: e.y, vx: (Math.random()-.5)*4, vy: (Math.random()-.5)*4, life: 18+Math.random()*8, color: particleColor });
  }
}

function killEnemy(e) {
  e.dead = true;
  gold += e.reward;
  score++;
  updateUI();
  if (e.trojan) hatch(e, ['ground','ground','ground'], 6, '#c8a060');
  else if (e.boss) hatch(e, ['trojan','trojan','ground','ground'], 10, '#903050');
}

function startWave() {
  if (waveActive || gameOver) return;
  wave++; waveActive = true;
  const total = 5 + wave * 3;
  const trojanIdx = wave >= 2 ? Math.floor(total / 2) : -1;
  const bossIdx = wave === 10 ? total - 1 : -1;
  spawnQueue = [];
  for (let i = 0; i < total; i++) {
    if (i === bossIdx) { spawnQueue.push('boss'); continue; }
    if (i === trojanIdx) { spawnQueue.push('trojan'); continue; }
    const isAir = wave >= 3 && (i % 4 === 3);
    spawnQueue.push(isAir ? 'air' : 'ground');
  }
  spawnTimer = 0;
  document.getElementById('start-btn').disabled = true;
  updateUI();
}

function updateUI() {
  document.getElementById('lives').textContent = lives;
  document.getElementById('gold').textContent = gold;
  document.getElementById('wave').textContent = wave;
  document.getElementById('score').textContent = score;
  document.getElementById('start-btn').disabled = waveActive;
  updateTowerButtons();
  updateCtxPaths();
}

function updateTowerButtons() {
  Object.keys(TOWER_DEFS).forEach(t => {
    const b = document.getElementById(t+'-btn');
    if (!b) return;
    const affordable = gold >= TOWER_DEFS[t].cost;
    b.disabled = !affordable;
    if (!affordable && mode === t) clearMode();
  });
}

function tick() {
  if (gameOver) return;
  tick_count++;
  if (!waveActive && autoWave) { autoDelay--; if (autoDelay <= 0) startWave(); }
  if (waveActive && spawnQueue.length > 0) { spawnTimer--; if (spawnTimer <= 0) { spawnEnemy(spawnQueue.shift()); spawnTimer = 55; } }

  for (const e of enemies) {
    if (e.dead) continue;
    const target = path[e.pathIdx];
    if (!target) { e.dead = true; lives--; updateUI(); continue; }
    const slowMult = e.slowMult !== undefined ? e.slowMult : 1;
    const spd = e.speed * slowMult;
    const tx = target.x*CELL+CELL/2, ty = target.y*CELL+CELL/2;
    const d = dist(e.x,e.y,tx,ty);
    if (d < spd+1) { e.pathIdx++; if (e.pathIdx >= path.length) { e.dead = true; lives--; updateUI(); } }
    else { e.x += (tx-e.x)/d*spd; e.y += (ty-e.y)/d*spd; }
    if (e.slowMult !== undefined) e.slowMult = Math.min(1, e.slowMult + 0.02);
    e.t++;
  }

  function findPierceTarget(x, y, exclude) {
    let best = null, bestD = 24;
    for (const e of enemies) {
      if (e === exclude || e.dead || e.hp <= 0) continue;
      const d = dist(x, y, e.x, e.y);
      if (d < bestD) { best = e; bestD = d; }
    }
    return best;
  }

  function applyDamage(e, dmg) {
    e.hp -= dmg;
    if (e.hp <= 0) killEnemy(e);
  }

  for (const t of towers) {
    const stats = towerStats(t);
    if (t.def.type !== 'inferno') {
      // Normal tower logic
      t.cooldown = Math.max(0, t.cooldown-1);
      if (t.cooldown > 0) continue;
      const c = cellCenter(t.gx, t.gy);
      const canHitAir = canTargetAir(t);
      let best = null, bestIdx = -1;
      for (const e of enemies) {
        if (e.dead || e.hp <= 0) continue;
        if (e.flying && !canHitAir) continue;
        if (dist(c.x,c.y,e.x,e.y) <= stats.range*CELL && e.pathIdx > bestIdx) { best = e; bestIdx = e.pathIdx; }
      }
      if (best) {
        t.cooldown = stats.rate;
        const shots = stats.multishot || 1;
        for (let i = 0; i < shots; i++) {
          let dmg = stats.damage;
          let crit = false;
          if (stats.crit && Math.random() < stats.crit) { dmg *= stats.critMult; crit = true; }
          let overcharge = false;
          if (stats.overcharge && Math.random() < stats.overcharge) { dmg *= stats.overchargeMult; overcharge = true; }
          bullets.push({ x: c.x, y: c.y, target: best, speed: t.def.speed, dmg, color: crit || overcharge ? '#fff060' : t.def.pcolor, size: t.def.type==='laser'?2:3, type: t.def.type, pierce: stats.pierce, chain: stats.chain });
        }
      }
    } else {
      // Inferno tower: beam logic
      const c = cellCenter(t.gx, t.gy);
      const range = stats.range * CELL;
      // find closest enemy in range, prioritize furthest along path
      const canHitAir = canTargetAir(t);
      let best = null, bestIdx = -1;
      for (const e of enemies) {
        if (e.dead || e.hp <= 0) continue;
        if (e.flying && !canHitAir) continue;
        if (dist(c.x,c.y,e.x,e.y) <= range && e.pathIdx > bestIdx) { best = e; bestIdx = e.pathIdx; }
      }
      if (best) {
        // Check if same target — heat up, else reset
        if (t.heatTarget !== best) { t.heat = 0; t.heatTarget = best; }
        t.heat = Math.min(t.heat + stats.heatRate, 180);
        const heat01 = t.heat / 180;
        // damage scales with heat: starts at 0.3/tick, ramps to 4/tick over 3 seconds, scaled by path level
        const dmgPerTick = (0.3 + heat01 * 4) * stats.dmgMult;
        applyDamage(best, dmgPerTick);
        best.onFire = t.heat;
        // Cryo Core: the longer the beam stays locked on, the colder (slower) the target gets
        if (stats.cryo && !best.dead) {
          const slowPct = 0.05 + heat01 * 0.35;
          best.slowMult = Math.min(best.slowMult !== undefined ? best.slowMult : 1, 1 - slowPct);
        }
        // Utility capstone: splash a fraction of the tick damage to enemies within 1 cell
        if (stats.splash && !best.dead) {
          for (const e of enemies) {
            if (e === best || e.dead || e.hp <= 0) continue;
            if (dist(best.x, best.y, e.x, e.y) <= CELL) applyDamage(e, dmgPerTick * stats.splash);
          }
        }
        // fire particles along beam
        if (tick_count % 3 === 0) {
          const frac = Math.random();
          const px = c.x + (best.x - c.x) * frac;
          const py = c.y + (best.y - c.y) * frac;
          const r = Math.round(255);
          const g = Math.round(200 * (1 - heat01));
          particles.push({ x: px + (Math.random()-.5)*4, y: py + (Math.random()-.5)*4, vx: (Math.random()-.5)*1.5, vy: -Math.random()*2, life: 8 + Math.random()*6, color: `rgb(${r},${g},0)` });
        }
        if (best.dead) { t.heat=0; t.heatTarget=null; }
        t.beamTarget = best;
      } else {
        t.heat = Math.max(0, t.heat - 3);
        t.beamTarget = null;
        if (t.heatTarget) t.heatTarget = null;
      }
    }
  }

  for (const b of bullets) {
    if (b.done) continue;
    if (b.target.dead || b.target.hp <= 0) { b.done = true; continue; }
    const tx = b.target.x, ty = b.target.y;
    const d = dist(b.x,b.y,tx,ty);
    if (d < b.speed+2) {
      b.done = true;
      applyDamage(b.target, b.dmg);
      for (let i=0;i<4;i++) particles.push({ x:tx, y:ty, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:15, color:b.color });
      // Arrow Utility capstone: pierce hits a second nearby enemy for full damage
      if (b.pierce) {
        const second = findPierceTarget(tx, ty, b.target);
        if (second) {
          applyDamage(second, b.dmg);
          for (let i=0;i<3;i++) particles.push({ x:second.x, y:second.y, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:12, color:b.color });
        }
      }
      // Laser Utility capstone: chain a fraction of damage to a second nearby enemy
      if (b.chain) {
        const second = findPierceTarget(tx, ty, b.target);
        if (second) {
          applyDamage(second, b.dmg * b.chain);
          for (let i=0;i<3;i++) particles.push({ x:second.x, y:second.y, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:12, color:b.color });
        }
      }
    } else { b.x+=(tx-b.x)/d*b.speed; b.y+=(ty-b.y)/d*b.speed; }
  }

  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });
  bullets = bullets.filter(b => !b.done);
  enemies = enemies.filter(e => !e.dead && e.hp>0);

  if (waveActive && spawnQueue.length===0 && enemies.length===0) {
    waveActive = false; gold += 45+wave*5; updateUI();
    document.getElementById('start-btn').disabled = false;
    if (autoWave) autoDelay = 0;
  }

  if (lives <= 0) {
    gameOver = true; clearMode();
    showMsg('💀 Game Over!\nWave '+wave+' • '+score+' kills\n\nRefresh to restart', 0);
  }
}

function showMsg(text, dur) {
  const m = document.getElementById('msg');
  m.textContent = text; m.style.display = 'block';
  if (dur > 0) setTimeout(() => m.style.display='none', dur);
}

function drawBeam(x1, y1, x2, y2, heat) {
  const heat01 = heat / 180;
  const coreW = 1 + heat01 * 3;
  const glowW = 4 + heat01 * 10;
  const r = 255;
  const g = Math.round(180 * (1 - heat01));

  // outer glow
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${g},0,${0.15 + heat01*0.2})`;
  ctx.lineWidth = glowW; ctx.stroke();

  // mid
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${Math.round(g*0.6)},0,${0.5 + heat01*0.3})`;
  ctx.lineWidth = coreW * 2; ctx.stroke();

  // core white-hot
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${200+Math.round(55*heat01)},${Math.round(200*heat01)},${0.7+heat01*0.3})`;
  ctx.lineWidth = coreW; ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  const ps = pathSet();

  for (let gy=0; gy<ROWS; gy++) {
    for (let gx=0; gx<COLS; gx++) {
      const isPath = ps.has(gx+','+gy);
      const isHover = gx===hoverGX && gy===hoverGY && !isPath && mode && TOWER_DEFS[mode];
      const def = mode ? TOWER_DEFS[mode] : null;
      const canPlace = isHover && def && gold >= def.cost && !towerAt(gx,gy);
      ctx.fillStyle = isPath ? '#2a2010' : isHover ? (canPlace ? 'rgba(80,180,80,0.25)' : 'rgba(180,60,60,0.25)') : '#0d1b2a';
      ctx.fillRect(gx*CELL, gy*CELL, CELL-1, CELL-1);
    }
  }

  for (let i=1; i<path.length-1; i++) {
    const p = path[i];
    ctx.fillStyle = '#3a3010';
    ctx.fillRect(p.x*CELL+1, p.y*CELL+1, CELL-3, CELL-3);
  }

  if (path.length) {
    const s = path[0];
    ctx.fillStyle = '#2a5a2a'; ctx.fillRect(s.x*CELL, s.y*CELL, CELL-1, CELL-1);
    ctx.font = '12px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='#7ec850'; ctx.fillText('▶', s.x*CELL+CELL/2, s.y*CELL+CELL/2+4);
    const e2 = path[path.length-1];
    ctx.fillStyle='#5a2a2a'; ctx.fillRect(e2.x*CELL, e2.y*CELL, CELL-1, CELL-1);
    ctx.fillText('🏰', e2.x*CELL+CELL/2, e2.y*CELL+CELL/2+4);
  }

  // Draw inferno beams behind towers
  for (const t of towers) {
    if (t.def.type === 'inferno' && t.beamTarget && t.heat > 0) {
      const c = cellCenter(t.gx, t.gy);
      drawBeam(c.x, c.y, t.beamTarget.x, t.beamTarget.y, t.heat);
    }
  }

  for (const t of towers) {
    const cx = t.gx*CELL+CELL/2, cy = t.gy*CELL+CELL/2;
    ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(t.gx*CELL+2, t.gy*CELL+2, CELL-5, CELL-5, 3);
    ctx.fill(); ctx.stroke();
    // Inferno: glow border when hot
    if (t.def.type === 'inferno' && t.heat > 0) {
      const h01 = t.heat/180;
      ctx.strokeStyle = `rgba(255,${Math.round(150*(1-h01))},0,${0.5+h01*0.5})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.font = '13px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t.def.icon, cx, cy+5);
    if (!t.def.canTargetAir && canTargetAir(t)) {
      ctx.fillStyle = '#8ec8ff'; ctx.strokeStyle = '#0a2a4a'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(t.gx*CELL+CELL-5, t.gy*CELL+5, 3.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }
    // Path level bars: one thin row per path (power/speed-or-heat/utility), width = level/5
    const pathColors = { power: '#e94560', speed: '#50c8f0', heat: '#8ec8ff', utility: '#7ec850' };
    const keys = PATH_KEYS[t.def.type];
    const barW = CELL - 6, barH = 1.5, barGap = 0.5;
    let barY = t.gy*CELL + CELL - 2 - (barH+barGap)*keys.length;
    for (const key of keys) {
      const level = t.paths[key];
      if (level > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(t.gx*CELL+3, barY, barW, barH);
        ctx.fillStyle = pathColors[key];
        ctx.fillRect(t.gx*CELL+3, barY, barW * (level/MAX_PATH_LEVEL), barH);
      }
      barY += barH + barGap;
    }
  }

  // Range preview
  if (mode && TOWER_DEFS[mode] && hoverGX >= 0 && hoverGY >= 0) {
    const def = TOWER_DEFS[mode];
    const ps2 = pathSet();
    const canPlace = !ps2.has(hoverGX+','+hoverGY) && !towerAt(hoverGX,hoverGY) && gold >= def.cost;
    const cx = hoverGX*CELL+CELL/2, cy = hoverGY*CELL+CELL/2;
    ctx.beginPath(); ctx.arc(cx, cy, def.range*CELL, 0, Math.PI*2);
    ctx.fillStyle = canPlace ? 'rgba(255,255,255,0.04)' : 'rgba(255,80,80,0.04)';
    ctx.fill();
    ctx.strokeStyle = canPlace
      ? (mode==='inferno' ? 'rgba(255,120,0,0.6)' : 'rgba(255,255,255,0.5)')
      : 'rgba(255,80,80,0.5)';
    ctx.lineWidth = 1; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  }

  for (const e of enemies) {
    const r=e.size, hpPct=e.hp/e.maxHp, pulse=0.85+0.15*Math.sin(e.t*0.15);
    const fireAmt = e.onFire ? Math.min(e.onFire/180, 1) : 0;
    const barY = e.flying ? e.y-r-10 : e.y-r-6;

    if (e.flying) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.ellipse(e.x, e.y+3, r*0.85, r*0.35, 0, 0, Math.PI*2); ctx.fill();

      const baseR = Math.round(90+90*(1-hpPct));
      const baseG = Math.round(170+50*hpPct);
      const er = Math.round(baseR*(1-fireAmt) + 255*fireAmt);
      const eg = Math.round(baseG*(1-fireAmt) + 90*fireAmt);
      ctx.save();
      ctx.translate(e.x, e.y-4);
      ctx.rotate(Math.PI/4);
      ctx.fillStyle = `rgba(${er},${eg},255,0.95)`;
      ctx.fillRect(-r*pulse, -r*pulse, r*2*pulse, r*2*pulse);
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,255,255,0.6)';
      ctx.lineWidth=1+fireAmt; ctx.strokeRect(-r*pulse, -r*pulse, r*2*pulse, r*2*pulse);
      ctx.restore();
    } else if (e.boss) {
      const rr = r*pulse;
      ctx.fillStyle = 'rgba(140,20,60,0.25)';
      ctx.beginPath(); ctx.arc(e.x, e.y, rr+5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},60,0.95)` : '#5a1030';
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = Math.PI/4*i - Math.PI/8;
        const px = e.x + Math.cos(a)*rr, py = e.y + Math.sin(a)*rr;
        i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,120,160,0.8)';
      ctx.lineWidth = 2+fireAmt; ctx.stroke();
      ctx.font = Math.round(rr*1.3)+'px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('💀', e.x, e.y+rr*0.45);
    } else if (e.trojan) {
      const rr = r*pulse;
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},40,0.95)` : '#8a5a2a';
      ctx.beginPath(); ctx.roundRect(e.x-rr, e.y-rr, rr*2, rr*2, 3); ctx.fill();
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,220,150,0.7)';
      ctx.lineWidth = 1.5+fireAmt; ctx.stroke();
      ctx.font = Math.round(rr*1.4)+'px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐴', e.x, e.y+rr*0.5);
    } else {
      const baseR = Math.round(220*(1-hpPct)+40*hpPct);
      const baseG = Math.round(60*hpPct+20);
      const baseB = Math.round(180*hpPct+40);
      const er = Math.round(baseR*(1-fireAmt) + 255*fireAmt);
      const eg = Math.round(baseG*(1-fireAmt) + 80*fireAmt);
      const eb = Math.round(baseB*(1-fireAmt));
      ctx.fillStyle=`rgba(${er},${eg},${eb},0.95)`;
      ctx.beginPath(); ctx.arc(e.x,e.y,r*pulse,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,255,255,0.4)';
      ctx.lineWidth=1+fireAmt; ctx.stroke();
    }
    e.onFire = 0;

    const bw=r*2.2;
    ctx.fillStyle='#333'; ctx.fillRect(e.x-bw/2, barY, bw, 3);
    ctx.fillStyle=hpPct>0.5?'#7ec850':hpPct>0.25?'#f0c040':'#e94560';
    ctx.fillRect(e.x-bw/2, barY, bw*hpPct, 3);
  }

  for (const b of bullets) {
    ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.size,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  for (const p of particles) {
    ctx.globalAlpha=p.life/15; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loop() {
  tick();
  if (doubleSpeed) tick();
  draw();
  requestAnimationFrame(loop);
}

generatePath();
updateUI();

document.querySelectorAll('#ui button, #tower-menu button, #action-menu button, #tower-context-menu button').forEach(btn => {
  btn.style.setProperty('color', '#ffffff', 'important');
  btn.addEventListener('mouseenter', () => btn.style.setProperty('color', '#000000', 'important'));
  btn.addEventListener('mouseleave', () => btn.style.setProperty('color', '#ffffff', 'important'));
});

loop();
showMsg('New: ✈️ Air units arrive from wave 3!\n🔥 Inferno tracks air by default — level a 🏹/⚡ tower\'s 🎯 Utility path to tier 2 to hit them.\n🐴 Trojan horses hide 3 units — kill it and they scatter!\n💀 Wave 10: a boss hides 2 trojans + 2 units inside!', 5000);
</script>
</body>
</html>
