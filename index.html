<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; overflow-x: hidden; overflow-y: auto; cursor: default; }
#ui { position: fixed; top: 0; left: 0; right: 0; z-index: 600; display: flex; align-items: center; justify-content: flex-end; gap: 22px; padding: 10px 18px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
.stat { font-size: 22px; color: #cfd8e6; font-family: sans-serif; }
.stat span { color: #fff; font-weight: 700; font-size: 26px; }
#ui button, #tower-menu button, #ability-menu button, #action-menu button, #tower-context-menu button, #start-panel button { padding: 4px 8px; font-size: 11px; border-radius: 5px; cursor: pointer; transition: all 0.15s; color: #ffffff; border: 1px solid #666; background: #2a2a3a; font-family: sans-serif; }
#ui button:hover, #tower-menu button:hover, #ability-menu button:hover, #action-menu button:hover, #tower-context-menu button:hover, #start-panel button:hover { background: #ffffff; border-color: #000; }
.tower-btn { border: 2px solid #aaa !important; }
.tower-btn.selected { border-color: #f0c040 !important; box-shadow: 0 0 0 2px #f0c040; }
#start-btn { background: #0f3460; border-color: #e94560 !important; }
#start-btn:disabled { opacity: 0.4; cursor: default; }
#gameover-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 900; flex-direction: column; align-items: center; gap: 10px; padding: 24px 32px; background: #16213e; border: 1px solid #0f3460; border-radius: 10px; text-align: center; font-family: sans-serif; color: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
#go-title { font-size: 26px; font-weight: 600; }
#go-stats { font-size: 14px; color: #ccc; }
#go-best { font-size: 12px; color: #f0c040; }
#go-restart-btn { padding: 8px 20px; font-size: 13px; border-radius: 6px; cursor: pointer; background: #0f3460; border: 1px solid #e94560; color: #fff; font-family: sans-serif; }
#go-restart-btn:hover { background: #e94560; }
#title-screen { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); font-family: sans-serif; color: #fff; text-align: center; }
#title-name { font-size: 48px; font-weight: 700; letter-spacing: 0.02em; text-shadow: 0 0 30px rgba(233,69,96,0.5), 0 0 10px rgba(255,255,255,0.25); }
#title-tagline { font-size: 14px; color: #7891b0; max-width: 420px; }
#title-tower-row { font-size: 22px; filter: drop-shadow(0 0 8px rgba(255,150,0,0.4)); }
#title-play-btn { padding: 14px 40px; font-size: 18px; font-weight: 600; border-radius: 8px; cursor: pointer; background: #0f3460; border: 2px solid #e94560; color: #fff; font-family: sans-serif; transition: all 0.15s; }
#title-play-btn:hover { background: #e94560; transform: scale(1.05); }
#start-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 950; flex-direction: column; align-items: center; gap: 14px; padding: 26px 34px; background: #16213e; border: 1px solid #0f3460; border-radius: 10px; text-align: center; font-family: sans-serif; color: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
#start-title { font-size: 24px; font-weight: 600; }
.start-section { display: flex; flex-direction: column; gap: 6px; align-items: center; }
.start-label { font-size: 11px; color: #7891b0; text-transform: uppercase; letter-spacing: 0.05em; }
.start-btn-row { display: flex; gap: 8px; }
.start-choice-btn.selected { border-color: #f0c040 !important; box-shadow: 0 0 0 2px #f0c040; }
#start-best { font-size: 12px; color: #f0c040; min-height: 14px; }
#start-begin-btn { padding: 10px 26px; font-size: 14px; border-radius: 6px; cursor: pointer; background: #0f3460; border: 1px solid #e94560; color: #fff; font-family: sans-serif; margin-top: 4px; }
#start-begin-btn:hover { background: #e94560; }
#auto-btn.on { background: #1a2a1a; border-color: #4a8a4a !important; }
#speed-btn.on { background: #2a1a3a; border-color: #7a40aa !important; }
#cursor-tower { position: fixed; pointer-events: none; font-size: 20px; transform: translate(-50%, -50%); display: none; z-index: 999; filter: drop-shadow(0 0 6px rgba(255,150,0,0.8)); }
#tower-menu { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 500; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: #16213e; border: 1px solid #0f3460; border-left: none; border-radius: 0 8px 8px 0; }
#tower-menu-label { font-size: 11px; color: #7891b0; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; }
#ability-menu { position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 500; display: flex; align-items: stretch; overflow: hidden; background: #16213e; border: 1px solid #0f3460; border-right: none; border-radius: 8px 0 0 8px; }
#ability-menu-content { max-width: 0; overflow: hidden; display: flex; flex-direction: column; gap: 10px; justify-content: center; transition: max-width 0.25s ease, padding 0.25s ease; padding: 10px 0; }
#ability-menu.open #ability-menu-content { max-width: 220px; padding: 10px; }
#ability-menu-handle { writing-mode: vertical-rl; padding: 16px 6px; font-size: 12px; border: none; background: #0f3460; color: #fff; cursor: pointer; font-family: sans-serif; }
#ability-menu-handle:hover { background: #14407a; }
.ability-row { display: flex; flex-direction: column; gap: 3px; }
.ability-row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ability-row-label { font-size: 11px; color: #aaa; white-space: nowrap; }
.ability-row-btn { flex: none; min-width: 92px; }
.ability-row-desc { font-size: 10px; color: #7891b0; line-height: 1.3; max-width: 150px; white-space: normal; }
.ability-group { display: flex; flex-direction: column; gap: 4px; }
.ability-instance-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ability-instance-label { font-size: 10px; color: #7891b0; white-space: nowrap; }
#action-menu { position: fixed; right: 0; bottom: 0; z-index: 500; display: flex; gap: 8px; padding: 8px 10px; background: #16213e; border-top: 1px solid #0f3460; border-left: 1px solid #0f3460; }
#tower-context-menu { display: none; position: fixed; left: 50%; bottom: 0; transform: translateX(-50%); z-index: 700; flex-direction: column; gap: 8px; padding: 10px 12px; background: #16213e; border: 1px solid #0f3460; border-bottom: none; border-radius: 8px 8px 0 0; min-width: 260px; }
#ctx-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
#ctx-tower-icon-wrap { position: relative; width: 30px; height: 30px; flex: none; }
#ctx-tower-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: #ffffff; border: 1.5px solid #000000; border-radius: 4px; }
#ctx-tower-info-btn { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; padding: 0; border-radius: 50%; background: #0f3460; border: 1px solid #f0c040; color: #f0c040; font-size: 10px; font-weight: 700; font-style: normal; line-height: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: sans-serif; }
#ctx-tower-info-btn:hover { background: #f0c040; color: #16213e; }
#ctx-paths { display: flex; flex-direction: column; gap: 8px; }
.ctx-path-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ctx-path-label { font-size: 11px; color: #aaa; white-space: nowrap; }
.ctx-path-label .lvl { color: #f0c040; font-weight: 600; }
.ctx-path-btn { flex: none; min-width: 92px; }
.ctx-path-desc { font-size: 10px; color: #7891b0; margin-top: 2px; line-height: 1.3; }
.ctx-path-locked { opacity: 0.45; }
#upgrade-tree-modal { display: none; position: fixed; inset: 0; z-index: 800; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); }
#upgrade-tree-content { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 14px 16px; width: 340px; max-width: 90vw; max-height: 80vh; overflow-y: auto; font-family: sans-serif; color: #fff; }
#upgrade-tree-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
#upgrade-tree-title { font-size: 14px; font-weight: 600; }
.ut-path { margin-bottom: 12px; }
.ut-path:last-child { margin-bottom: 0; }
.ut-path-title { font-size: 12px; color: #f0c040; font-weight: 600; margin-bottom: 4px; }
.ut-tier { display: flex; gap: 8px; padding: 3px 0; font-size: 11px; color: #6a7a90; align-items: baseline; }
.ut-tier-reached { color: #9ef08a; }
.ut-tier-next { color: #fff; font-weight: 600; }
.ut-tier-lvl { flex: none; width: 46px; }
.ut-tier-cost { flex: none; width: 44px; color: #7891b0; }
.ut-tier-desc { flex: 1; }
.ability-row-btn.ability-ready { border-color: #f0c040 !important; box-shadow: 0 0 0 2px rgba(240,192,64,0.4); }
#ui button:disabled, #tower-menu button:disabled, #ability-menu button:disabled, #action-menu button:disabled, #tower-context-menu button:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div id="ui">
  <div class="stat">❤️ <span id="lives">20</span></div>
  <div class="stat">💰 <span id="gold">150</span></div>
  <div class="stat">🌊 Wave <span id="wave">0</span></div>
</div>
<canvas id="c"></canvas>
<div id="msg" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:500;text-align:center;pointer-events:none;color:#fff;text-shadow:0 0 20px rgba(0,0,0,0.9);display:none;white-space:pre;font-family:sans-serif;z-index:600;"></div>
<div id="title-screen">
  <div id="title-name">🏰 Tower Defense</div>
  <div id="title-tagline">Defend the castle. Upgrade relentlessly. Survive the swarm.</div>
  <div id="title-tower-row">🏹 ⚡ 🔥 🧊 🎯</div>
  <button id="title-play-btn" onclick="showStartPanel()">▶ Play</button>
</div>
<div id="gameover-panel">
  <div id="go-title">💀 Game Over</div>
  <div id="go-stats"></div>
  <div id="go-best"></div>
  <button id="go-restart-btn" onclick="restartGame()">🔄 Restart</button>
</div>
<div id="start-panel">
  <div id="start-title">🏰 Tower Defense</div>
  <div class="start-section">
    <div class="start-label">Difficulty</div>
    <div class="start-btn-row" id="difficulty-row">
      <button class="start-choice-btn" data-diff="easy" onclick="selectDifficulty('easy')">Easy</button>
      <button class="start-choice-btn" data-diff="normal" onclick="selectDifficulty('normal')">Normal</button>
      <button class="start-choice-btn" data-diff="hard" onclick="selectDifficulty('hard')">Hard</button>
    </div>
  </div>
  <div class="start-section">
    <div class="start-label">Map</div>
    <div class="start-btn-row" id="map-row">
      <button class="start-choice-btn" onclick="selectMap(0)">Switchback</button>
      <button class="start-choice-btn" onclick="selectMap(1)">Deep Zigzag</button>
      <button class="start-choice-btn" onclick="selectMap(2)">Long Sweep</button>
    </div>
  </div>
  <div id="start-best"></div>
  <button id="start-begin-btn" onclick="beginRun()">▶ Start Game</button>
</div>
<div id="cursor-tower"></div>
<div id="tower-menu">
  <div id="tower-menu-label">🏗️ Towers</div>
  <button class="tower-btn" id="arrow-btn" onclick="selectMode('arrow')">🏹 Arrow (50g)</button>
  <button class="tower-btn" id="laser-btn" onclick="selectMode('laser')">⚡ Laser (80g)</button>
  <button class="tower-btn" id="inferno-btn" onclick="selectMode('inferno')">🔥 Inferno (150g)</button>
  <button class="tower-btn" id="frost-btn" onclick="selectMode('frost')" title="Slows on hit and can shatter frozen enemies for bonus damage">🧊 Frost (110g)</button>
  <button class="tower-btn" id="sniper-btn" onclick="selectMode('sniper')" title="Longest range, huge single-shot damage, always targets the toughest enemy in range, and can hit air from the start">🎯 Sniper (180g)</button>
</div>
<div id="ability-menu" style="display:none;">
  <button id="ability-menu-handle" onclick="toggleAbilityMenu()">✨ Abilities ▶</button>
  <div id="ability-menu-content"></div>
</div>
<div id="action-menu">
  <button id="auto-btn" onclick="toggleAuto()">⏩ Auto: OFF</button>
  <button id="speed-btn" onclick="toggleSpeed()">▶▶ 1×</button>
  <button id="start-btn" onclick="startWave()">Start Wave ▶</button>
</div>
<div id="tower-context-menu">
  <div id="ctx-header">
    <div id="ctx-tower-icon-wrap">
      <div id="ctx-tower-icon"></div>
      <button id="ctx-tower-info-btn" onclick="toggleUpgradeTree()" title="View full upgrade path">i</button>
    </div>
    <button id="ctx-sell-btn" onclick="ctxSell()">💸 Sell</button>
  </div>
  <div id="ctx-paths">
    <div class="ctx-path" data-slot="0">
      <div class="ctx-path-row">
        <span class="ctx-path-label"></span>
        <button class="ctx-path-btn" onclick="ctxPathUpgrade(0)"></button>
      </div>
      <div class="ctx-path-desc"></div>
    </div>
    <div class="ctx-path" data-slot="1">
      <div class="ctx-path-row">
        <span class="ctx-path-label"></span>
        <button class="ctx-path-btn" onclick="ctxPathUpgrade(1)"></button>
      </div>
      <div class="ctx-path-desc"></div>
    </div>
    <div class="ctx-path" data-slot="2">
      <div class="ctx-path-row">
        <span class="ctx-path-label"></span>
        <button class="ctx-path-btn" onclick="ctxPathUpgrade(2)"></button>
      </div>
      <div class="ctx-path-desc"></div>
    </div>
  </div>
</div>
<div id="upgrade-tree-modal" onclick="if (event.target === this) hideUpgradeTree();">
  <div id="upgrade-tree-content">
    <div id="upgrade-tree-header">
      <span id="upgrade-tree-title"></span>
      <button id="upgrade-tree-close-btn" onclick="hideUpgradeTree()">✕</button>
    </div>
    <div id="upgrade-tree-paths"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor-tower');
const COLS = 22;
const ROWS = 14;
// Only the left side is reserved, for the Towers panel -- it needs its own clear
// column since it's clickable. The stat bar overlapping the top of the map is fine
// (it floats on top via z-index and isn't interactive), so no top/right reservation.
const RESERVED_LEFT = 145;   // Towers panel width
const availW = Math.max(COLS, window.innerWidth - RESERVED_LEFT);
// Width, not height, is maximized: most windows are wider relative to the 22x14 grid
// than they are tall, so capping by height as well left large unused side margins.
// Filling the width instead means the map can now be taller than one screen -- the
// page scrolls for the rest, with the stat bar/side panels pinned in place.
const CELL = Math.floor(availW / COLS);
const GAME_W = COLS * CELL;
const GAME_H = ROWS * CELL;
// Enemy radii and icon font sizes below were tuned at this cell size; scale them by
// how far CELL has grown past it so sprites keep filling the cell at any zoom level.
const BASE_CELL = 28;
const SPRITE_SCALE = CELL / BASE_CELL;

canvas.width = GAME_W;
canvas.height = GAME_H;
canvas.style.display = 'block';
canvas.style.margin = '0';
canvas.style.marginLeft = (RESERVED_LEFT + Math.max(0, (availW - GAME_W) / 2)) + 'px';
canvas.style.marginBottom = '20px';

// All sound is synthesized with WebAudio (no asset files). The context is created lazily
// since browsers require it to happen inside a user gesture (a click already triggers it).
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, dur, type, vol, sweepTo) {
  try {
    const a = getAudioCtx();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, a.currentTime);
    if (sweepTo) osc.frequency.exponentialRampToValueAtTime(sweepTo, a.currentTime + dur);
    gain.gain.setValueAtTime(vol, a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.connect(gain); gain.connect(a.destination);
    osc.start();
    osc.stop(a.currentTime + dur);
  } catch (err) { /* audio is a nice-to-have, never let it break gameplay */ }
}
function sfxPlace()         { playTone(320, 0.08, 'square',   0.12, 500); }
function sfxUpgrade()       { playTone(440, 0.12, 'triangle', 0.14, 700); }
function sfxAbility()       { playTone(200, 0.25, 'sawtooth', 0.16, 700); }
function sfxKill(isBoss)    { isBoss ? playTone(120, 0.5, 'sawtooth', 0.2, 40) : playTone(660, 0.07, 'square', 0.07, 320); }
function sfxWaveStart()     { playTone(300, 0.15, 'triangle', 0.14, 600); }
function sfxWaveComplete()  { playTone(500, 0.2,  'triangle', 0.15, 900); }
function sfxLifeLost()      { playTone(180, 0.2,  'sawtooth', 0.18, 80); }
function sfxGameOver()      { playTone(220, 0.6,  'sawtooth', 0.2,  60); }

let mode = null;
let towers = [], enemies = [], bullets = [], particles = [], popups = [];
let lives = 20, gold = 150, wave = 0, score = 0;
let waveActive = false, spawnQueue = [], spawnTimer = 0;
let gameOver = false, path = [], autoWave = false, autoDelay = 0;
let hoverGX = -1, hoverGY = -1;
let doubleSpeed = false;
let tick_count = 0;
let gameStarted = false, difficulty = 'normal', selectedMap = 0;

const MAX_PATH_LEVEL = 5;
const CROSSPATH_CAP = 2; // at most one path may exceed this tier at a time
const BOSS_VARIANTS = ['classic', 'armored', 'swarm'];

const DIFFICULTIES = {
  easy:   { label: 'Easy',   startLives: 25, startGold: 200, enemyHpMult: 0.8, enemySpeedMult: 0.9,  goldMult: 1.15 },
  normal: { label: 'Normal', startLives: 20, startGold: 150, enemyHpMult: 1.0, enemySpeedMult: 1.0,  goldMult: 1.0 },
  hard:   { label: 'Hard',   startLives: 15, startGold: 120, enemyHpMult: 1.3, enemySpeedMult: 1.15, goldMult: 0.85 },
};

const TOWER_DEFS = {
  arrow:   { cost: 50,  range: 3,     damage: 75, rate: 60, color: '#7ec850', pcolor: '#b0ff70', speed: 7,  type: 'arrow',   icon: '🏹', canTargetAir: false },
  laser:   { cost: 80,  range: 4.125, damage: 20, rate: 20, color: '#50c8f0', pcolor: '#80e8ff', speed: 12, type: 'laser',   icon: '⚡', canTargetAir: false },
  inferno: { cost: 150, range: 3.5,   damage: 0,  rate: 1,  color: '#ff6010', pcolor: '#ff9040', speed: 0,  type: 'inferno', icon: '🔥', canTargetAir: true },
  frost:   { cost: 110, range: 3.25,  damage: 35, rate: 45, color: '#40c0ff', pcolor: '#c0f0ff', speed: 8,  type: 'frost',   icon: '🧊', canTargetAir: false },
  sniper:  { cost: 180, range: 5.5,   damage: 260, rate: 150, color: '#c8c8d8', pcolor: '#eaeaff', speed: 26, type: 'sniper', icon: '🎯', canTargetAir: true },
};

// Each tier entry is the tower's stat state AT that tier (not a delta). Tier index 0 = path level 1.
const PATH_KEYS = {
  arrow:   ['power', 'speed', 'utility'],
  laser:   ['power', 'speed', 'utility'],
  inferno: ['power', 'heat',  'utility'],
  frost:   ['power', 'chill', 'utility'],
  sniper:  ['power', 'speed', 'utility'],
};

const PATH_META = {
  power:   { icon: '💪', name: 'Power' },
  speed:   { icon: '⚡', name: 'Speed' },
  heat:    { icon: '🥶', name: 'Heat' },
  chill:   { icon: '❄️', name: 'Chill' },
  utility: { icon: '🎯', name: 'Utility' },
};

const PATH_DEFS = {
  arrow: {
    power: [
      { cost: 45,  dmgMult: 1.20 },
      { cost: 75,  dmgMult: 1.40 },
      { cost: 135, dmgMult: 1.65 },
      { cost: 210, dmgMult: 1.95 },
      { cost: 300, dmgMult: 2.40, crit: 0.20, critMult: 2 },
    ],
    speed: [
      { cost: 45,  rateMult: 0.90 },
      { cost: 75,  rateMult: 0.80 },
      { cost: 135, rateMult: 0.68 },
      { cost: 210, rateMult: 0.55 },
      { cost: 300, rateMult: 0.42, multishot: 2 },
    ],
    utility: [
      { cost: 40,  rangeAdd: 0.5 },
      { cost: 70,  rangeAdd: 0.75, unlockAA: true },
      { cost: 120, rangeAdd: 1.0 },
      { cost: 180, rangeAdd: 1.25 },
      { cost: 270, rangeAdd: 1.5, pierce: 1 },
    ],
  },
  laser: {
    power: [
      { cost: 60,  dmgMult: 1.20 },
      { cost: 100, dmgMult: 1.40 },
      { cost: 165, dmgMult: 1.65 },
      { cost: 255, dmgMult: 1.95 },
      { cost: 360, dmgMult: 2.40, overcharge: 0.20, overchargeMult: 2.0 },
    ],
    speed: [
      { cost: 60,  rateMult: 0.88 },
      { cost: 100, rateMult: 0.76 },
      { cost: 165, rateMult: 0.62 },
      { cost: 255, rateMult: 0.46 },
      { cost: 360, rateMult: 0.30 },
    ],
    utility: [
      { cost: 55,  rangeAdd: 0.4 },
      { cost: 85,  rangeAdd: 0.6, unlockAA: true },
      { cost: 145, rangeAdd: 0.8 },
      { cost: 225, rangeAdd: 1.0 },
      { cost: 315, rangeAdd: 1.2, chain: 0.5 },
    ],
  },
  inferno: {
    power: [
      { cost: 90,  dmgMult: 1.2 },
      { cost: 150, dmgMult: 1.45 },
      { cost: 240, dmgMult: 1.75 },
      { cost: 345, dmgMult: 2.1 },
      { cost: 480, dmgMult: 2.5 },
    ],
    heat: [
      { cost: 90,  heatRate: 1.15 },
      { cost: 150, heatRate: 1.35 },
      { cost: 240, heatRate: 1.6 },
      { cost: 345, heatRate: 1.9 },
      { cost: 480, heatRate: 2.2, cryo: true },
    ],
    utility: [
      { cost: 75,  rangeAdd: 0.25 },
      { cost: 130, rangeAdd: 0.5 },

function newTowerPaths(type) {
  const paths = {};
  PATH_KEYS[type].forEach(k => paths[k] = 0);
  return paths;
}

// Effective stats/mechanics for a tower, combining its base def with whatever
// tier each of its 3 paths has reached (only the highest reached tier per path applies).
function towerStats(t) {
  const stats = Object.assign({ dmgMult: 1, rateMult: 1, rangeAdd: 0, heatRate: 1 }, t.def);
  for (const key of PATH_KEYS[t.def.type]) {
    const level = t.paths[key];
    // Merge every tier up through the current one — numeric stats are overwritten by
    // the latest (highest) tier, while one-time unlock flags (e.g. unlockAA) persist
    // once granted even if a later tier's entry doesn't repeat them.
    for (let i = 0; i < level; i++) Object.assign(stats, PATH_DEFS[t.def.type][key][i]);
  }
  stats.damage = t.def.damage * stats.dmgMult;
  stats.rate = Math.max(1, Math.round(t.def.rate * stats.rateMult));
  stats.range = t.def.range + stats.rangeAdd;
  return stats;
}

function canTargetAir(t) {
  return t.def.canTargetAir || !!towerStats(t).unlockAA;
}

// Each tower's active ability unlocks once its Power path hits the capstone tier —
// a manually-triggered burst on top of that tier's passive bonus, on its own cooldown.
const ACTIVE_ABILITIES = {
  arrow: { icon: '🎯', name: 'Volley',      cooldown: 800, desc: 'Instantly strikes every enemy in range for a full hit each.' },
  frost: { icon: '🧊', name: 'Deep Freeze', cooldown: 850, desc: 'Fully freezes every enemy in range for a few seconds.' },
};

function abilityUnlocked(t) {
  return t.paths.power >= MAX_PATH_LEVEL;
}

function enemiesInRange(t, stats) {
  const c = cellCenter(t.gx, t.gy);
  const canHitAir = canTargetAir(t);
  const range = stats.range * CELL;
  return enemies.filter(e => !e.dead && e.hp > 0 && (!e.flying || canHitAir) && dist(c.x, c.y, e.x, e.y) <= range);
}

function activateAbility(t) {
  const stats = towerStats(t);
  const targets = enemiesInRange(t, stats);
  if (t.def.type === 'arrow') {
    for (const e of targets) {
      let dmg = stats.damage;
      let crit = false;
      if (stats.crit && Math.random() < stats.crit) { dmg *= stats.critMult; crit = true; }
      applyDamage(e, dmg);
      for (let i = 0; i < 3; i++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-.5)*3, vy: (Math.random()-.5)*3, life: 14, color: t.def.pcolor });
      if (crit) popups.push({ x: e.x, y: e.y-8, text: Math.round(dmg)+'!', color: '#fff060', vy: -0.5, life: 30 });
    }
  } else if (t.def.type === 'frost') {
    for (const e of targets) {
      e.slowMult = 0; e.freezeLock = 150;
      for (let i = 0; i < 6; i++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-.5)*2, vy: (Math.random()-.5)*2, life: 18, color: '#a0e8ff' });
    }
  }
}

// Human-readable summary of what a single tier entry grants, generated straight from
// its fields so the description can never drift out of sync with the actual mechanics.
function describeTier(def) {
  const parts = [];
  if (def.dmgMult !== undefined) parts.push('+' + Math.round((def.dmgMult - 1) * 100) + '% dmg');
  if (def.rateMult !== undefined) parts.push('+' + Math.round((1 - def.rateMult) * 100) + '% fire rate');
  if (def.rangeAdd !== undefined) parts.push('+' + def.rangeAdd + ' range');
  if (def.heatRate !== undefined) parts.push('+' + Math.round((def.heatRate - 1) * 100) + '% heat rate');
  if (def.unlockAA) parts.push('unlocks anti-air targeting');
  if (def.pierce) parts.push('arrows pierce to a 2nd enemy');
  if (def.chain) parts.push('beam chains ' + Math.round(def.chain * 100) + '% dmg to a 2nd enemy');
  if (def.splash) parts.push('splashes ' + Math.round(def.splash * 100) + '% dmg to nearby enemies');
  if (def.crit) parts.push(Math.round(def.crit * 100) + '% chance to crit for ' + def.critMult + '×');
  if (def.overcharge) parts.push(Math.round(def.overcharge * 100) + '% chance to overcharge for ' + def.overchargeMult + '×');
  if (def.multishot) parts.push('fires ' + def.multishot + ' shots per attack');
  if (def.cryo) parts.push('chills the target, slowing it up to 40%');
  if (def.slowPct !== undefined) parts.push('slows target ' + Math.round(def.slowPct*100) + '%');
  if (def.freeze) parts.push(Math.round(def.freeze*100) + '% chance to fully freeze the target briefly');
  if (def.shatter) parts.push(Math.round(def.shatter*100) + '% bonus dmg vs slowed enemies');
  if (def.novaSlow) parts.push('hits pulse ' + Math.round(def.novaSlow*100) + '% slow to nearby enemies');
  if (def.armorPierce) parts.push('ignores ' + Math.round(def.armorPierce*100) + '% of target armor');
  return parts.join(', ');
}

// Whether a given path can still be leveled up on this tower, given the crosspathing rules:
//  - A tower may only ever have levels in 2 of its 3 paths. Once 2 paths have at least
//    1 level, the untouched 3rd path locks and can never be started. This is independent
//    of tier — you can start a 2nd path any time, even after the 1st is already deep in.
//  - A path already at the cap (tier 2) can't go past it once some OTHER path has
//    exceeded the cap — but paths still below the cap remain free to climb up to it
//    regardless of what any other path is doing.
function canLevelPath(t, key) {
  const level = t.paths[key];
  if (level >= MAX_PATH_LEVEL) return false;
  const others = PATH_KEYS[t.def.type].filter(k => k !== key);
  if (level === 0 && others.filter(k => t.paths[k] > 0).length >= 2) return false;
  if (level >= CROSSPATH_CAP && others.some(k => t.paths[k] > CROSSPATH_CAP)) return false;
  return true;
}

function selectMode(m) {

// The Abilities panel stays hidden (like the Towers panel is always shown) until the
// player has actually unlocked at least one tower's ability by maxing its Power path.
//
// refreshAbilityMenu() runs both after discrete game events (updateUI, many times a
// second during combat via kills/gold changes) and every tick (for the live cooldown
// countdown) — so it only tears down and rebuilds the row elements when the actual set
// of unlocked-ability towers changes, and otherwise just patches the existing buttons'
// text/state in place. Rebuilding unconditionally on every call would risk a real click
// landing on an element mid-swap and silently missing.
let abilityMenuTowers = [];
let hoveredAbilityTower = null;
let abilityTipShown = false;
const WAVE_TIPS = {
  3: '🐴 Trojan horse incoming — kill it and the 3 units it hides will scatter!',
  4: '🏃 Sprinters incoming!',
  5: '🛡️ Shielded enemies incoming — they resist damage until the shield breaks!',
  6: '🟢 Oozes incoming — they split into smaller enemies on death!',
  7: '💉 Medics incoming — they heal nearby enemies, so target them first!',
};
// These warn a wave early (near the tail of the prior wave) since they take build-up
// to counter — an anti-air upgrade, or a strong/varied roster for a boss fight —
// rather than just an in-the-moment targeting call.
const EARLY_WAVE_TIPS = {
  4: '✈️ Air units next wave — make sure a tower can target air!',
  10: '💀 Boss next wave! A boss appears every 5 waves, cycling Classic / Armored / Swarm variants.',
};
let shownWaveTips = new Set();
let shownEarlyTips = new Set();
function sameTowerList(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) return false;
  return true;
}

// Groups unlocked towers by ability type (fixed type order, so the menu doesn't
// reshuffle as towers are placed/sold) so same-ability towers sit together under
// one shared header instead of repeating identical rows.
function groupedAbilityTowers() {
  const groups = [];
  for (const type of Object.keys(ACTIVE_ABILITIES)) {
    const list = towers.filter(t => t.def.type === type && abilityUnlocked(t));
    if (list.length) groups.push({ type, list });
  }
  return groups;
}

function refreshAbilityMenu() {
  const groups = groupedAbilityTowers();
  const flat = groups.flatMap(g => g.list);
  if (!sameTowerList(flat, abilityMenuTowers)) {
    const hadNone = abilityMenuTowers.length === 0;
    abilityMenuTowers = flat;
    rebuildAbilityMenu(groups);
    if (hadNone && flat.length && !abilityTipShown) {
      abilityTipShown = true;
      showMsg('✨ Abilities tab unlocked — click it to fire your tower\'s active ability!', 4000);
    }
    return;
  }
  document.querySelectorAll('#ability-menu-content .ability-row-btn').forEach((btn, i) => {
    const t = flat[i];
    if (t.activeCooldown > 0) {
      btn.disabled = true;
      btn.classList.remove('ability-ready');
      btn.textContent = '⏳ ' + Math.ceil(t.activeCooldown/60) + 's';
    } else if (btn.disabled) {
      btn.disabled = false;
      btn.classList.add('ability-ready');
      btn.textContent = 'Activate!';
    }
  });
}

function rebuildAbilityMenu(groups) {
  hoveredAbilityTower = null;
  document.getElementById('ability-menu').style.display = groups.length ? 'flex' : 'none';
  const content = document.getElementById('ability-menu-content');
  content.innerHTML = '';
  groups.forEach(({ type, list }) => {
    const ability = ACTIVE_ABILITIES[type];
    const group = document.createElement('div');
    group.className = 'ability-group';
    const top = document.createElement('div');
    top.className = 'ability-row-top';
    const label = document.createElement('span');
    label.className = 'ability-row-label';
    label.innerHTML = ability.icon + ' ' + ability.name;
    top.appendChild(label);
    const desc = document.createElement('div');
    desc.className = 'ability-row-desc';
    desc.textContent = ability.desc;
    group.appendChild(top);
    group.appendChild(desc);
    list.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'ability-instance-row';
      const instLabel = document.createElement('span');
      instLabel.className = 'ability-instance-label';
      instLabel.textContent = '#' + (i + 1);
      const btn = document.createElement('button');
      btn.className = 'ability-row-btn';
      if (t.activeCooldown > 0) {
        btn.disabled = true;
        btn.textContent = '⏳ ' + Math.ceil(t.activeCooldown/60) + 's';
      } else {
        btn.disabled = false;
        btn.textContent = 'Activate!';
        btn.classList.add('ability-ready');
      }
      btn.addEventListener('click', () => activateTowerAbility(t));
      row.addEventListener('mouseenter', () => hoveredAbilityTower = t);
      row.addEventListener('mouseleave', () => { if (hoveredAbilityTower === t) hoveredAbilityTower = null; });
      wireButtonHoverColor(btn);
      row.appendChild(instLabel);
      row.appendChild(btn);
      group.appendChild(row);
    });
    content.appendChild(group);
  });
}

function activateTowerAbility(t) {
  if (gameOver || !ACTIVE_ABILITIES[t.def.type] || !abilityUnlocked(t) || t.activeCooldown > 0) return;
  activateAbility(t);
  t.activeCooldown = ACTIVE_ABILITIES[t.def.type].cooldown;
  updateUI();
  showMsg(ACTIVE_ABILITIES[t.def.type].icon + ' ' + ACTIVE_ABILITIES[t.def.type].name + '!', 1000);
  sfxAbility();
}

function updateCtxPaths() {
  if (!ctxTower) return;
  const type = ctxTower.def.type;
  const keys = PATH_KEYS[type];
  document.querySelectorAll('.ctx-path').forEach((container, i) => {
    const key = keys[i];
    const meta = PATH_META[key];
    const level = ctxTower.paths[key];
    const label = container.querySelector('.ctx-path-label');
    const btn = container.querySelector('.ctx-path-btn');
    const desc = container.querySelector('.ctx-path-desc');
    label.innerHTML = meta.icon + ' ' + meta.name + ' <span class="lvl">' + level + '/' + MAX_PATH_LEVEL + '</span>';
    if (level >= MAX_PATH_LEVEL) {
      btn.disabled = true;
      btn.textContent = 'Maxed';
      container.classList.remove('ctx-path-locked');
      desc.textContent = describeTier(PATH_DEFS[type][key][level - 1]);
    } else if (!canLevelPath(ctxTower, key)) {
      btn.disabled = true;
      btn.textContent = 'Locked';
      container.classList.add('ctx-path-locked');
      desc.textContent = 'Next: ' + describeTier(PATH_DEFS[type][key][level]);
    } else {
      const next = PATH_DEFS[type][key][level];
      btn.disabled = gold < next.cost;
      btn.textContent = 'Upgrade (' + next.cost + 'g)';
      container.classList.remove('ctx-path-locked');
      desc.textContent = 'Next: ' + describeTier(next);
    }
  });
}

      }

function ctxPathUpgrade(slot) {

  if (gold < next.cost) { showMsg('Not enough gold', 1000); return; }
  gold -= next.cost;
  ctxTower.invested += next.cost;
  ctxTower.paths[key]++;
  updateUI();
  showMsg(ctxTower.def.icon + ' ' + PATH_META[key].name + ' Lv' + ctxTower.paths[key] + '!', 1200);
  updateCtxPaths();
  sfxUpgrade();
}

// Each layout returns a start cell and a list of waypoints; generatePath() walks from
// one to the next moving x-then-y (matching the original single hardcoded path), so any
// waypoint list here produces a valid orthogonal path with no further changes needed.
const MAP_LAYOUTS = [
  { name: 'Switchback', build(COLS, ROWS) { return {
    start: { x: 0, y: Math.floor(ROWS*0.35) },
    targets: [
      {x: Math.floor(COLS*0.25), y: Math.floor(ROWS*0.35)},
      {x: Math.floor(COLS*0.25), y: Math.floor(ROWS*0.75)},
      {x: Math.floor(COLS*0.6),  y: Math.floor(ROWS*0.75)},
      {x: Math.floor(COLS*0.6),  y: Math.floor(ROWS*0.2)},
      {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.2)},
      {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.6)},
      {x: COLS+1,                y: Math.floor(ROWS*0.6)},
    ],
  }; } },
  { name: 'Deep Zigzag', build(COLS, ROWS) { return {
    start: { x: 0, y: Math.floor(ROWS*0.15) },
    targets: [
      {x: Math.floor(COLS*0.8),  y: Math.floor(ROWS*0.15)},
      {x: Math.floor(COLS*0.8),  y: Math.floor(ROWS*0.4)},
      {x: Math.floor(COLS*0.15), y: Math.floor(ROWS*0.4)},
      {x: Math.floor(COLS*0.15), y: Math.floor(ROWS*0.65)},
      {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.65)},
      {x: Math.floor(COLS*0.85), y: Math.floor(ROWS*0.9)},
      {x: Math.floor(COLS*0.05), y: Math.floor(ROWS*0.9)},
      {x: COLS+1,                y: Math.floor(ROWS*0.9)},
    ],
  }; } },
  { name: 'Long Sweep', build(COLS, ROWS) { return {
    start: { x: 0, y: Math.floor(ROWS*0.5) },
    targets: [
      {x: Math.floor(COLS*0.35), y: Math.floor(ROWS*0.5)},
      {x: Math.floor(COLS*0.35), y: Math.floor(ROWS*0.85)},
      {x: Math.floor(COLS*0.7),  y: Math.floor(ROWS*0.85)},
      {x: Math.floor(COLS*0.7),  y: Math.floor(ROWS*0.15)},
      {x: COLS+1,                y: Math.floor(ROWS*0.15)},
    ],
  }; } },
];

function generatePath(mapIdx) {
  const { start, targets } = MAP_LAYOUTS[mapIdx].build(COLS, ROWS);
  path = [];
  let { x, y } = start;
  path.push({x, y});
  for (const t of targets) {
    while (x !== t.x) { x += (t.x > x ? 1 : -1); path.push({x,y}); }
    while (y !== t.y) { y += (t.y > y ? 1 : -1); path.push({x,y}); }
  }
}

function pathSet() {
  const s = new Set();
  path.forEach(p => s.add(p.x+','+p.y));
  return s;
}

function cellCenter(gx, gy) { return { x: gx*CELL+CELL/2, y: gy*CELL+CELL/2 }; }
function towerAt(gx, gy) { return towers.find(t => t.gx===gx && t.gy===gy); }
function dist(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }

canvas.addEventListener('click', e => {
  if (gameOver || !gameStarted) return;
  const rect = canvas.getBoundingClientRect();
  const gx = Math.floor((e.clientX - rect.left) / CELL);
  const gy = Math.floor((e.clientY - rect.top) / CELL);
  if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) { hideTowerContext(); return; }
  const ps = pathSet();
  const existing = towerAt(gx, gy);

  if (mode && TOWER_DEFS[mode]) {
    if (ps.has(gx+','+gy) || existing) return;
    const def = TOWER_DEFS[mode];
    if (gold < def.cost) { showMsg('Insufficient funds', 1000); return; }
    gold -= def.cost;
    towers.push({ gx, gy, def, cooldown: 0, heatTarget: null, heat: 0, paths: newTowerPaths(mode), invested: def.cost, activeCooldown: 0 });
    updateUI();
    clearMode();
    sfxPlace();
    return;
  }

  if (existing) {
    if (ctxTower === existing) hideTowerContext();
    else showTowerContext(existing);
  } else {
    hideTowerContext();
  }
});

function bossVariantForWave(w) {
  return BOSS_VARIANTS[Math.floor((w - 10) / 5) % BOSS_VARIANTS.length];
}

function enemyStatsBase(type, variant) {
  if (type === 'boss') {
    const base = { hp: 500, speed: 0.55 + wave * 0.03, reward: 150, size: 13 };
    if (variant === 'armored') return { hp: Math.round(base.hp * 1.35), speed: +(base.speed * 0.65).toFixed(3), reward: base.reward + 40, size: 14, armor: 0.35 };
    if (variant === 'swarm') return { hp: Math.round(base.hp * 0.85), speed: +(base.speed * 1.1).toFixed(3), reward: base.reward + 40, size: 12, spawnsMinions: true };
    return base;
  }
  if (type === 'trojan') return { hp: wave >= 5 ? 200 : 150, speed: 0.85 + wave * 0.05, reward: 25, size: 10 };
  if (type === 'air') return { hp: 125, speed: 1.7 + wave * 0.07, reward: 15, size: 6 };
  if (type === 'shield') return { hp: 90 + wave * 4, speed: 0.9 + wave * 0.05, reward: 20, size: 9, shield: 50 + wave * 5 };
  if (type === 'medic') return { hp: 70 + wave * 3, speed: 0.8 + wave * 0.04, reward: 22, size: 8 };
  if (type === 'sprinter') return { hp: 55, speed: 2.1 + wave * 0.08, reward: 12, size: 6 };
  if (type === 'ooze') return { hp: 130 + wave * 5, speed: 0.9 + wave * 0.04, reward: 18, size: 9 };
  if (type === 'ooze_mini') return { hp: 45, speed: 1.1 + wave * 0.05, reward: 6, size: 5 };
  return { hp: 100, speed: 1.1 + wave * 0.08, reward: 5, size: 7 };
}

// Difficulty scales HP/speed (and shield, since it's really extra HP) uniformly across
// every enemy type rather than needing a multiplier baked into each branch above.
function enemyStats(type, variant) {
  const s = enemyStatsBase(type, variant);
  const diff = DIFFICULTIES[difficulty];
  s.hp = Math.round(s.hp * diff.enemyHpMult);
  s.speed = +(s.speed * diff.enemySpeedMult).toFixed(3);
  if (s.shield) s.shield = Math.round(s.shield * diff.enemyHpMult);
  return s;
}

// The full state a spawned enemy needs, shared by fresh spawns and hatched sub-enemies.
function makeEnemy(type, variant, pathIdx, x, y) {
  const s = enemyStats(type, variant);
  return {
    kind: type === 'boss' ? 'boss_' + variant : type, bossVariant: variant,
    flying: type === 'air', trojan: type === 'trojan', boss: type === 'boss',
    pathIdx, x, y, hp: s.hp, maxHp: s.hp, speed: s.speed, reward: s.reward, size: s.size, t: 0,
    shield: s.shield || 0, maxShield: s.shield || 0, armor: s.armor || 0,
    spawnsMinions: !!s.spawnsMinions, minionTimer: s.spawnsMinions ? 150 : undefined,
    healTimer: type === 'medic' ? 100 : undefined,
  };
}

function spawnEnemy(type, variant) {
  enemies.push(makeEnemy(type, variant, 0, path[0].x*CELL+CELL/2, path[0].y*CELL+CELL/2));
}

const HATCH_MAP = {
  trojan:       { types: ['ground','ground','ground'],  radius: 6,  color: '#c8a060' },
  boss_classic: { types: ['trojan','trojan','ground','ground'], radius: 10, color: '#903050' },
  boss_armored: { types: ['ground','ground','ground','ground'], radius: 10, color: '#606060' },
  boss_swarm:   { types: ['air','air','air'],            radius: 10, color: '#7030a0' },
  ooze:         { types: ['ooze_mini','ooze_mini'],      radius: 5,  color: '#40c040' },
};

// Lives lost when an enemy of this kind escapes uncaught — recursively counts every
// unit hidden inside (trojans inside a boss each count their own hidden units too).
function escapeCost(kind) {
  const h = HATCH_MAP[kind];
  if (!h) return 1;
  return h.types.reduce((sum, k) => sum + escapeCost(k), 0);
}

function enemyEscapeCost(e) {
  return escapeCost(e.kind || 'ground');
}

function hatch(e, types, radius, particleColor) {
  types.forEach((type, i) => {
    const ang = (Math.PI * 2 / types.length) * i;
    enemies.push(makeEnemy(type, undefined, e.pathIdx, e.x + Math.cos(ang) * radius, e.y + Math.sin(ang) * radius));
  });
  for (let i = 0; i < 14; i++) {
    particles.push({ x: e.x, y: e.y, vx: (Math.random()-.5)*4, vy: (Math.random()-.5)*4, life: 18+Math.random()*8, color: particleColor });
  }
}

function killEnemy(e) {
  e.dead = true;
  gold += e.reward;
  score++;
  updateUI();
  sfxKill(e.boss);
  const h = HATCH_MAP[e.kind];
  if (h) hatch(e, h.types, h.radius, h.color);
}

function applyDamage(e, dmg, armorPierce) {
  if (e.armor) dmg *= (1 - e.armor * (1 - (armorPierce || 0)));
  if (e.shield > 0) {
    const absorb = Math.min(e.shield, dmg);
    e.shield -= absorb;
    dmg -= absorb;
  }
  if (dmg <= 0) return;
  e.hp -= dmg;
  if (e.hp <= 0) killEnemy(e);
}

function startWave() {
  if (waveActive || gameOver) return;
  wave++; waveActive = true;
  const total = 5 + wave * 3;
  const isBossWave = wave >= 10 && wave % 5 === 0;
  const trojanIdx = wave >= 3 ? Math.floor(total / 2) : -1;
  const bossIdx = isBossWave ? total - 1 : -1;
  const bossVariant = isBossWave ? bossVariantForWave(wave) : null;
  spawnQueue = [];
  for (let i = 0; i < total; i++) {
    if (i === bossIdx) { spawnQueue.push({ type: 'boss', variant: bossVariant }); continue; }
    if (i === trojanIdx) { spawnQueue.push({ type: 'trojan' }); continue; }
    if (wave >= 4 && i % 4 === 3) { spawnQueue.push({ type: 'air' }); continue; }
    if (wave >= 5 && i % 5 === 1) { spawnQueue.push({ type: 'shield' }); continue; }
    if (wave >= 7 && i % 7 === 2) { spawnQueue.push({ type: 'medic' }); continue; }
    if (wave >= 6 && i % 6 === 4) { spawnQueue.push({ type: 'ooze' }); continue; }
    if (wave >= 4 && i % 5 === 0) { spawnQueue.push({ type: 'sprinter' }); continue; }
    spawnQueue.push({ type: 'ground' });
  }
  spawnTimer = 0;
  document.getElementById('start-btn').disabled = true;
  updateUI();
  sfxWaveStart();
  if (WAVE_TIPS[wave] && !shownWaveTips.has(wave)) {
    shownWaveTips.add(wave);
    showMsg(WAVE_TIPS[wave], 4000);
  }
}

function updateUI() {
  document.getElementById('lives').textContent = lives;
  document.getElementById('gold').textContent = gold;
  document.getElementById('wave').textContent = wave;
  document.getElementById('start-btn').disabled = waveActive;
  updateTowerButtons();
  updateCtxPaths();
  refreshAbilityMenu();
}

function updateTowerButtons() {
  Object.keys(TOWER_DEFS).forEach(t => {
    const b = document.getElementById(t+'-btn');
    if (!b) return;
    const affordable = gold >= TOWER_DEFS[t].cost;
    b.disabled = !affordable;
    if (!affordable && mode === t) clearMode();
  });
}

function loseLife(e) {
  e.dead = true;
  lives -= enemyEscapeCost(e);
  updateUI();
  sfxLifeLost();
}

function tick() {
  if (gameOver || !gameStarted) return;
  tick_count++;
  if (!waveActive && autoWave) { autoDelay--; if (autoDelay <= 0) startWave(); }
  if (waveActive && spawnQueue.length > 0) { spawnTimer--; if (spawnTimer <= 0) { const next = spawnQueue.shift(); spawnEnemy(next.type, next.variant); spawnTimer = 55; } }

  for (const e of enemies) {
    if (e.dead) continue;
    const target = path[e.pathIdx];
    if (!target) { loseLife(e); continue; }
    const slowMult = e.slowMult !== undefined ? e.slowMult : 1;
    const spd = e.speed * slowMult;
    const tx = target.x*CELL+CELL/2, ty = target.y*CELL+CELL/2;
    const d = dist(e.x,e.y,tx,ty);
    if (d < spd+1) { e.pathIdx++; if (e.pathIdx >= path.length) loseLife(e); }
    else { e.x += (tx-e.x)/d*spd; e.y += (ty-e.y)/d*spd; }
    if (e.freezeLock > 0) { e.freezeLock--; e.slowMult = 0; }
    else if (e.slowMult !== undefined) e.slowMult = Math.min(1, e.slowMult + 0.02);
    e.t++;
  }

  for (const e of enemies) {
    if (e.dead) continue;
    if (e.kind === 'medic') {
      e.healTimer--;
      if (e.healTimer <= 0) {
        e.healTimer = 100;
        for (const o of enemies) {
          if (o === e || o.dead || o.boss) continue;
          if (dist(e.x,e.y,o.x,o.y) <= 70) o.hp = Math.min(o.maxHp, o.hp + o.maxHp*0.18);
        }
        for (let i = 0; i < 10; i++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-.5)*2, vy: -Math.random()*2-0.5, life: 20, color: '#7fffab' });
      }
    }
    if (e.spawnsMinions) {
      e.minionTimer--;
      if (e.minionTimer <= 0) {
        e.minionTimer = 140;
        enemies.push(makeEnemy('air', undefined, e.pathIdx, e.x, e.y));
      }
    }
  }

  function findPierceTarget(x, y, exclude) {
    let best = null, bestD = 24;
    for (const e of enemies) {
      if (e === exclude || e.dead || e.hp <= 0) continue;
      const d = dist(x, y, e.x, e.y);
      if (d < bestD) { best = e; bestD = d; }
    }
    return best;
  }

  for (const t of towers) {
    t.activeCooldown = Math.max(0, (t.activeCooldown||0) - 1);
    const stats = towerStats(t);
    if (t.def.type !== 'inferno') {
      // Normal tower logic
      t.cooldown = Math.max(0, t.cooldown-1);
      if (t.cooldown > 0) continue;
      const c = cellCenter(t.gx, t.gy);
      const canHitAir = canTargetAir(t);
      const isSniper = t.def.type === 'sniper';
      let best = null, bestIdx = -1, bestHp = -1;
      for (const e of enemies) {
        if (e.dead || e.hp <= 0) continue;
        if (e.flying && !canHitAir) continue;
        if (dist(c.x,c.y,e.x,e.y) > stats.range*CELL) continue;
        // Every other tower targets whichever enemy is furthest along the path. The
        // Sniper instead always picks off the toughest enemy in range (highest current
        // HP), so it naturally focuses bosses/armored units while other towers handle
        // the rest of the wave.
        if (isSniper) { if (e.hp > bestHp) { best = e; bestHp = e.hp; } }
        else if (e.pathIdx > bestIdx) { best = e; bestIdx = e.pathIdx; }
      }
      if (best) {
        t.cooldown = stats.rate;
        const shots = stats.multishot || 1;
        for (let i = 0; i < shots; i++) {
          let dmg = stats.damage;
          let crit = false;
          if (stats.crit && Math.random() < stats.crit) { dmg *= stats.critMult; crit = true; }
          let overcharge = false;
          if (stats.overcharge && Math.random() < stats.overcharge) { dmg *= stats.overchargeMult; overcharge = true; }
          if (stats.shatter && best.slowMult !== undefined && best.slowMult < 1) dmg *= (1 + stats.shatter);
          bullets.push({ x: c.x, y: c.y, target: best, speed: t.def.speed, dmg, color: crit || overcharge ? '#fff060' : t.def.pcolor, size: t.def.type==='laser'?2:3, type: t.def.type, pierce: stats.pierce, chain: stats.chain, slowPct: stats.slowPct, freeze: stats.freeze, novaSlow: stats.novaSlow, armorPierce: stats.armorPierce, crit, overcharge });
        }
      }
    } else {
      // Inferno tower: beam logic
      const c = cellCenter(t.gx, t.gy);
      const range = stats.range * CELL;
      // find closest enemy in range, prioritize furthest along path
      const canHitAir = canTargetAir(t);
      let best = null, bestIdx = -1;
      for (const e of enemies) {
        if (e.dead || e.hp <= 0) continue;
        if (e.flying && !canHitAir) continue;
        if (dist(c.x,c.y,e.x,e.y) <= range && e.pathIdx > bestIdx) { best = e; bestIdx = e.pathIdx; }
      }
      if (best) {
        // Check if same target — heat up, else reset
        if (t.heatTarget !== best) { t.heat = 0; t.heatTarget = best; }
        t.heat = Math.min(t.heat + stats.heatRate, 180);
        const heat01 = t.heat / 180;
        // damage scales with heat: starts at 0.3/tick, ramps to 4/tick over 3 seconds, scaled by path level
        const dmgPerTick = (0.3 + heat01 * 4) * stats.dmgMult;
        applyDamage(best, dmgPerTick);
        best.onFire = t.heat;
        // Cryo Core: the longer the beam stays locked on, the colder (slower) the target gets
        if (stats.cryo && !best.dead) {
          const slowPct = 0.05 + heat01 * 0.35;
          best.slowMult = Math.min(best.slowMult !== undefined ? best.slowMult : 1, 1 - slowPct);
        }
        // Utility capstone: splash a fraction of the tick damage to enemies within 1 cell
        if (stats.splash && !best.dead) {
          for (const e of enemies) {
            if (e === best || e.dead || e.hp <= 0) continue;
            if (dist(best.x, best.y, e.x, e.y) <= CELL) applyDamage(e, dmgPerTick * stats.splash);
          }
        }
        // fire particles along beam
        if (tick_count % 3 === 0) {
          const frac = Math.random();
          const px = c.x + (best.x - c.x) * frac;
          const py = c.y + (best.y - c.y) * frac;
          const r = Math.round(255);
          const g = Math.round(200 * (1 - heat01));
          particles.push({ x: px + (Math.random()-.5)*4, y: py + (Math.random()-.5)*4, vx: (Math.random()-.5)*1.5, vy: -Math.random()*2, life: 8 + Math.random()*6, color: `rgb(${r},${g},0)` });
        }
        if (best.dead) { t.heat=0; t.heatTarget=null; }
        t.beamTarget = best;
      } else {
        t.heat = Math.max(0, t.heat - 3);
        t.beamTarget = null;
        if (t.heatTarget) t.heatTarget = null;
      }
    }
  }

  for (const b of bullets) {
    if (b.done) continue;
    if (b.target.dead || b.target.hp <= 0) { b.done = true; continue; }
    const tx = b.target.x, ty = b.target.y;
    const d = dist(b.x,b.y,tx,ty);
    if (d < b.speed+2) {
      b.done = true;
      applyDamage(b.target, b.dmg, b.armorPierce);
      for (let i=0;i<4;i++) particles.push({ x:tx, y:ty, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:15, color:b.color });
      if (b.crit || b.overcharge) {
        popups.push({ x: tx, y: ty-8, text: Math.round(b.dmg)+'!', color: '#fff060', vy: -0.5, life: 30 });
      }
      // Frost tower: slows the target on hit, with a small chance to fully freeze it
      if (b.slowPct && !b.target.dead) {
        b.target.slowMult = Math.min(b.target.slowMult !== undefined ? b.target.slowMult : 1, 1 - b.slowPct);
        if (b.freeze && Math.random() < b.freeze) { b.target.slowMult = 0; b.target.freezeLock = 24; }
        // Frost Utility capstone: nova pulses a lighter slow to nearby enemies too
        if (b.novaSlow) {
          for (const e of enemies) {
            if (e === b.target || e.dead || e.hp <= 0) continue;
            if (dist(tx, ty, e.x, e.y) <= 40) e.slowMult = Math.min(e.slowMult !== undefined ? e.slowMult : 1, 1 - b.novaSlow);
          }
        }
      }
      // Arrow Utility capstone: pierce hits a second nearby enemy for full damage
      if (b.pierce) {
        const second = findPierceTarget(tx, ty, b.target);
        if (second) {
          applyDamage(second, b.dmg);
          for (let i=0;i<3;i++) particles.push({ x:second.x, y:second.y, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:12, color:b.color });
        }
      }
      // Laser Utility capstone: chain a fraction of damage to a second nearby enemy
      if (b.chain) {
        const second = findPierceTarget(tx, ty, b.target);
        if (second) {
          applyDamage(second, b.dmg * b.chain);
          for (let i=0;i<3;i++) particles.push({ x:second.x, y:second.y, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:12, color:b.color });
        }
      }
    } else { b.x+=(tx-b.x)/d*b.speed; b.y+=(ty-b.y)/d*b.speed; }
  }

  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });
  popups = popups.filter(p => { p.y+=p.vy; p.life--; return p.life>0; });
  bullets = bullets.filter(b => !b.done);
  enemies = enemies.filter(e => !e.dead && e.hp>0);

  if (waveActive && spawnQueue.length===0 && enemies.length<=3) {
    const nextTip = EARLY_WAVE_TIPS[wave+1];
    if (nextTip && !shownEarlyTips.has(wave+1)) {
      shownEarlyTips.add(wave+1);
      showMsg(nextTip, 4000);
    }
  }

  if (waveActive && spawnQueue.length===0 && enemies.length===0) {
    waveActive = false;
    const bonus = Math.round((45+wave*5) * DIFFICULTIES[difficulty].goldMult);
    gold += bonus; updateUI();
    document.getElementById('start-btn').disabled = false;
    sfxWaveComplete();
    if (autoWave) autoDelay = 0;
  }

  if (lives <= 0) {
    gameOver = true; clearMode();
    hideTowerContext();
    sfxGameOver();
    showGameOver();
  }

  refreshAbilityMenu();
}

function showMsg(text, dur) {
  const m = document.getElementById('msg');
  m.textContent = text; m.style.display = 'block';
  if (dur > 0) setTimeout(() => m.style.display='none', dur);
}

// High scores are kept per-difficulty since Easy/Normal/Hard runs aren't a fair comparison.
const HIGH_SCORE_KEY = 'td_highscores';
function loadHighScores() {
  try { return JSON.parse(localStorage.getItem(HIGH_SCORE_KEY)) || {}; } catch (err) { return {}; }
}
function saveHighScore(diff, s, w) {
  const all = loadHighScores();
  all[diff] = { score: s, wave: w };
  try { localStorage.setItem(HIGH_SCORE_KEY, JSON.stringify(all)); } catch (err) { /* storage unavailable, skip persisting */ }
}

function showGameOver() {
  const best = loadHighScores()[difficulty];
  const isNewBest = !best || score > best.score;
  if (isNewBest) saveHighScore(difficulty, score, wave);
  document.getElementById('go-stats').textContent = 'Wave ' + wave + ' • ' + score + ' kills (' + DIFFICULTIES[difficulty].label + ')';
  document.getElementById('go-best').textContent = isNewBest ? '🏆 New Best!' : ('Best: Wave ' + best.wave + ' • ' + best.score + ' kills');
  document.getElementById('gameover-panel').style.display = 'flex';
}

// Restarting reopens the start screen (rather than immediately relaunching with the same
// settings) so the player can pick a fresh difficulty/map for the next run; beginRun()
// does the actual state reset once they click Start again.
// Game HUD chrome (stat bar, tower/action menus) has nothing useful to do before a run
// starts, so it stays hidden behind the title/start screens instead of sitting there inert.
function setGameChromeVisible(visible) {
  const d = visible ? 'flex' : 'none';
  document.getElementById('ui').style.display = d;
  document.getElementById('tower-menu').style.display = d;
  document.getElementById('action-menu').style.display = d;
}

function showStartPanel() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('start-panel').style.display = 'flex';
}

function restartGame() {
  document.getElementById('gameover-panel').style.display = 'none';
  if (autoWave) toggleAuto();
  if (doubleSpeed) toggleSpeed();
  gameStarted = false;
  towers = []; enemies = []; bullets = []; particles = []; popups = [];
  waveActive = false; spawnQueue = []; spawnTimer = 0;
  wave = 0; score = 0;
  clearMode();
  hideTowerContext();
  abilityMenuTowers = [];
  hoveredAbilityTower = null;
  setGameChromeVisible(false);
  updateStartBest();
  updateUI();
  document.getElementById('start-panel').style.display = 'flex';
}

function selectDifficulty(diff) {
  difficulty = diff;
  document.querySelectorAll('#difficulty-row .start-choice-btn').forEach(b => b.classList.toggle('selected', b.dataset.diff === diff));
  updateStartBest();
}

function selectMap(idx) {
  selectedMap = idx;
  document.querySelectorAll('#map-row .start-choice-btn').forEach((b, i) => b.classList.toggle('selected', i === idx));
  generatePath(selectedMap);
}

function updateStartBest() {
  const best = loadHighScores()[difficulty];
  document.getElementById('start-best').textContent = best
    ? ('Best (' + DIFFICULTIES[difficulty].label + '): Wave ' + best.wave + ' • ' + best.score + ' kills')
    : '';
}

function beginRun() {
  const diff = DIFFICULTIES[difficulty];
  lives = diff.startLives; gold = diff.startGold; wave = 0; score = 0;
  towers = []; enemies = []; bullets = []; particles = []; popups = [];
  waveActive = false; spawnQueue = []; spawnTimer = 0;
  gameOver = false; autoDelay = 0; tick_count = 0;
  abilityMenuTowers = [];
  hoveredAbilityTower = null;
  abilityTipShown = false;
  shownWaveTips = new Set();
  shownEarlyTips = new Set();
  clearMode();
  hideTowerContext();
  generatePath(selectedMap);
  document.getElementById('start-panel').style.display = 'none';
  setGameChromeVisible(true);
  gameStarted = true;
  updateUI();
}

function drawBeam(x1, y1, x2, y2, heat) {
  const heat01 = heat / 180;
  const coreW = 1 + heat01 * 3;
  const glowW = 4 + heat01 * 10;
  const r = 255;
  const g = Math.round(180 * (1 - heat01));

  // outer glow
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${g},0,${0.15 + heat01*0.2})`;
  ctx.lineWidth = glowW; ctx.stroke();

  // mid
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${Math.round(g*0.6)},0,${0.5 + heat01*0.3})`;
  ctx.lineWidth = coreW * 2; ctx.stroke();

  // core white-hot
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.strokeStyle = `rgba(255,${200+Math.round(55*heat01)},${Math.round(200*heat01)},${0.7+heat01*0.3})`;
  ctx.lineWidth = coreW; ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  const ps = pathSet();

  for (let gy=0; gy<ROWS; gy++) {
    for (let gx=0; gx<COLS; gx++) {
      const isPath = ps.has(gx+','+gy);
      const isHover = gx===hoverGX && gy===hoverGY && !isPath && mode && TOWER_DEFS[mode];
      const def = mode ? TOWER_DEFS[mode] : null;
      const canPlace = isHover && def && gold >= def.cost && !towerAt(gx,gy);
      ctx.fillStyle = isPath ? '#2a2010' : isHover ? (canPlace ? 'rgba(80,180,80,0.25)' : 'rgba(180,60,60,0.25)') : '#0d1b2a';
      ctx.fillRect(gx*CELL, gy*CELL, CELL-1, CELL-1);
    }
  }

  for (let i=1; i<path.length-1; i++) {
    const p = path[i];
    ctx.fillStyle = '#3a3010';
    ctx.fillRect(p.x*CELL+1, p.y*CELL+1, CELL-3, CELL-3);
  }

  if (path.length) {
    const endpointFont = Math.round(12*SPRITE_SCALE);
    const s = path[0];
    ctx.fillStyle = '#2a5a2a'; ctx.fillRect(s.x*CELL, s.y*CELL, CELL-1, CELL-1);
    ctx.font = endpointFont+'px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif'; ctx.textAlign='center';
    ctx.fillStyle='#7ec850'; ctx.fillText('▶', s.x*CELL+CELL/2, s.y*CELL+CELL/2+Math.round(endpointFont*0.33));
    const e2 = path[path.length-1];
    ctx.fillStyle='#5a2a2a'; ctx.fillRect(e2.x*CELL, e2.y*CELL, CELL-1, CELL-1);
    ctx.fillText('🏰', e2.x*CELL+CELL/2, e2.y*CELL+CELL/2+Math.round(endpointFont*0.33));
  }

  // Draw inferno beams behind towers
  for (const t of towers) {
    if (t.def.type === 'inferno' && t.beamTarget && t.heat > 0) {
      const c = cellCenter(t.gx, t.gy);
      drawBeam(c.x, c.y, t.beamTarget.x, t.beamTarget.y, t.heat);
    }
  }

  for (const t of towers) {
    const cx = t.gx*CELL+CELL/2, cy = t.gy*CELL+CELL/2;
    ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(t.gx*CELL+2, t.gy*CELL+2, CELL-5, CELL-5, 3);
    ctx.fill(); ctx.stroke();
    // Inferno: glow border when hot
    if (t.def.type === 'inferno' && t.heat > 0) {
      const h01 = t.heat/180;
      ctx.strokeStyle = `rgba(255,${Math.round(150*(1-h01))},0,${0.5+h01*0.5})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    const towerFont = Math.round(13*SPRITE_SCALE);
    ctx.font = towerFont+'px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t.def.icon, cx, cy+Math.round(towerFont*0.38));
    if (!t.def.canTargetAir && canTargetAir(t)) {
      ctx.fillStyle = '#8ec8ff'; ctx.strokeStyle = '#0a2a4a'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(t.gx*CELL+CELL-5, t.gy*CELL+5, 3.5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }
    // Path level bars: one thin row per path (power/speed-or-heat/utility), width = level/5
    const pathColors = { power: '#e94560', speed: '#50c8f0', heat: '#8ec8ff', chill: '#40c0ff', utility: '#7ec850' };
    const keys = PATH_KEYS[t.def.type];
    const barW = CELL - 6, barH = 1.5, barGap = 0.5;
    let barY = t.gy*CELL + CELL - 2 - (barH+barGap)*keys.length;
    for (const key of keys) {
      const level = t.paths[key];
      if (level > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(t.gx*CELL+3, barY, barW, barH);
        ctx.fillStyle = pathColors[key];
        ctx.fillRect(t.gx*CELL+3, barY, barW * (level/MAX_PATH_LEVEL), barH);
      }
      barY += barH + barGap;
    }
    if (t === hoveredAbilityTower) {
      ctx.save();
      ctx.strokeStyle = '#f0c040';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#f0c040';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.roundRect(t.gx*CELL+1, t.gy*CELL+1, CELL-3, CELL-3, 4);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Range preview
  if (mode && TOWER_DEFS[mode] && hoverGX >= 0 && hoverGY >= 0) {
    const def = TOWER_DEFS[mode];
    const ps2 = pathSet();
    const canPlace = !ps2.has(hoverGX+','+hoverGY) && !towerAt(hoverGX,hoverGY) && gold >= def.cost;
    const cx = hoverGX*CELL+CELL/2, cy = hoverGY*CELL+CELL/2;
    ctx.beginPath(); ctx.arc(cx, cy, def.range*CELL, 0, Math.PI*2);
    ctx.fillStyle = canPlace ? 'rgba(255,255,255,0.04)' : 'rgba(255,80,80,0.04)';
    ctx.fill();
    ctx.strokeStyle = canPlace
      ? (mode==='inferno' ? 'rgba(255,120,0,0.6)' : mode==='frost' ? 'rgba(80,200,255,0.6)' : mode==='sniper' ? 'rgba(220,220,235,0.7)' : 'rgba(255,255,255,0.5)')
      : 'rgba(255,80,80,0.5)';
    ctx.lineWidth = 1; ctx.setLineDash([4,3]); ctx.stroke(); ctx.setLineDash([]);
  }

  for (const e of enemies) {
    const r=e.size*SPRITE_SCALE, hpPct=e.hp/e.maxHp, pulse=0.85+0.15*Math.sin(e.t*0.15);
    const fireAmt = e.onFire ? Math.min(e.onFire/180, 1) : 0;
    const barY = e.flying ? e.y-r-10 : e.y-r-6;

    if (e.flying) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.ellipse(e.x, e.y+3, r*0.85, r*0.35, 0, 0, Math.PI*2); ctx.fill();

      const baseR = Math.round(90+90*(1-hpPct));
      const baseG = Math.round(170+50*hpPct);
      const er = Math.round(baseR*(1-fireAmt) + 255*fireAmt);
      const eg = Math.round(baseG*(1-fireAmt) + 90*fireAmt);
      ctx.save();
      ctx.translate(e.x, e.y-4);
      ctx.rotate(Math.PI/4);
      ctx.fillStyle = `rgba(${er},${eg},255,0.95)`;
      ctx.fillRect(-r*pulse, -r*pulse, r*2*pulse, r*2*pulse);
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,255,255,0.6)';
      ctx.lineWidth=1+fireAmt; ctx.strokeRect(-r*pulse, -r*pulse, r*2*pulse, r*2*pulse);
      ctx.restore();
    } else if (e.boss) {
      const rr = r*pulse;
      const variantStyle = { classic: { color: '#5a1030', glow: 'rgba(140,20,60,0.25)', ring: 'rgba(255,120,160,0.8)', emoji: '💀' },
                              armored: { color: '#4a4a4a', glow: 'rgba(90,90,90,0.25)',  ring: 'rgba(200,200,210,0.8)', emoji: '🗿' },
                              swarm:   { color: '#5a2090', glow: 'rgba(110,40,160,0.25)', ring: 'rgba(210,160,255,0.8)', emoji: '👑' } }[e.bossVariant] || { color: '#5a1030', glow: 'rgba(140,20,60,0.25)', ring: 'rgba(255,120,160,0.8)', emoji: '💀' };
      ctx.fillStyle = variantStyle.glow;
      ctx.beginPath(); ctx.arc(e.x, e.y, rr+5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},60,0.95)` : variantStyle.color;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = Math.PI/4*i - Math.PI/8;
        const px = e.x + Math.cos(a)*rr, py = e.y + Math.sin(a)*rr;
        i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : variantStyle.ring;
      ctx.lineWidth = 2+fireAmt; ctx.stroke();
      ctx.font = Math.round(rr*1.3)+'px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(variantStyle.emoji, e.x, e.y+rr*0.45);
    } else if (e.trojan) {
      const rr = r*pulse;
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},40,0.95)` : '#8a5a2a';
      ctx.beginPath(); ctx.roundRect(e.x-rr, e.y-rr, rr*2, rr*2, 3); ctx.fill();
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,220,150,0.7)';
      ctx.lineWidth = 1.5+fireAmt; ctx.stroke();
      ctx.font = Math.round(rr*1.4)+'px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🐴', e.x, e.y+rr*0.5);
    } else if (e.kind === 'shield') {
      const rr = r*pulse;
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},60,0.95)` : '#3a5a7a';
      ctx.beginPath(); ctx.arc(e.x, e.y, rr, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
      if (e.shield > 0) {
        ctx.strokeStyle = `rgba(120,220,255,${0.4+0.5*(e.shield/e.maxShield)})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(e.x, e.y, rr+4, -Math.PI/2, -Math.PI/2 + Math.PI*2*(e.shield/e.maxShield)); ctx.stroke();
      }
    } else if (e.kind === 'medic') {
      const rr = r*pulse;
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},60,0.95)` : '#e05070';
      ctx.beginPath(); ctx.arc(e.x, e.y, rr, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x-rr*0.5, e.y-1.5, rr, 3);
      ctx.fillRect(e.x-1.5, e.y-rr*0.5, 3, rr);
    } else if (e.kind === 'ooze' || e.kind === 'ooze_mini') {
      const rr = r*pulse;
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},60,0.95)` : '#40c040';
      ctx.beginPath(); ctx.arc(e.x, e.y, rr, Math.PI*0.1, Math.PI*1.9); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1; ctx.stroke();
    } else if (e.kind === 'sprinter') {
      const rr = r*pulse;
      ctx.fillStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(140*(1-fireAmt))},60,0.95)` : '#f0e050';
      ctx.beginPath(); ctx.arc(e.x, e.y, rr, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1; ctx.stroke();
    } else {
      const baseR = Math.round(220*(1-hpPct)+40*hpPct);
      const baseG = Math.round(60*hpPct+20);
      const baseB = Math.round(180*hpPct+40);
      const er = Math.round(baseR*(1-fireAmt) + 255*fireAmt);
      const eg = Math.round(baseG*(1-fireAmt) + 80*fireAmt);
      const eb = Math.round(baseB*(1-fireAmt));
      ctx.fillStyle=`rgba(${er},${eg},${eb},0.95)`;
      ctx.beginPath(); ctx.arc(e.x,e.y,r*pulse,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = fireAmt > 0.3 ? `rgba(255,${Math.round(120*(1-fireAmt))},0,0.9)` : 'rgba(255,255,255,0.4)';
      ctx.lineWidth=1+fireAmt; ctx.stroke();
    }
    e.onFire = 0;

    if (e.slowMult !== undefined && e.slowMult < 0.97) {
      ctx.strokeStyle = `rgba(140,220,255,${0.3+0.5*(1-e.slowMult)})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(e.x, e.y, r*pulse+3, 0, Math.PI*2); ctx.stroke();
    }

    if (e.maxShield > 0) {
      const bw2 = r*2.2;
      ctx.fillStyle = '#1a2a33'; ctx.fillRect(e.x-bw2/2, barY-4, bw2, 2);
      ctx.fillStyle = '#60d0ff'; ctx.fillRect(e.x-bw2/2, barY-4, bw2*(e.shield/e.maxShield), 2);
    }

    const bw=r*2.2;
    ctx.fillStyle='#333'; ctx.fillRect(e.x-bw/2, barY, bw, 3);
    ctx.fillStyle=hpPct>0.5?'#7ec850':hpPct>0.25?'#f0c040':'#e94560';
    ctx.fillRect(e.x-bw/2, barY, bw*hpPct, 3);
  }

  for (const b of bullets) {
    ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.size,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  for (const p of particles) {
    ctx.globalAlpha=p.life/15; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.5,0,Math.PI*2); ctx.fill();
  }

  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  for (const p of popups) {
    ctx.globalAlpha = Math.min(1, p.life/30);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha=1;
}

function loop() {
  tick();
  if (doubleSpeed) tick();
  draw();
  requestAnimationFrame(loop);
}

selectDifficulty('normal');
selectMap(0);
setGameChromeVisible(false);
updateUI();

function wireButtonHoverColor(btn) {
  btn.style.setProperty('color', '#ffffff', 'important');
  btn.addEventListener('mouseenter', () => btn.style.setProperty('color', '#000000', 'important'));
  btn.addEventListener('mouseleave', () => btn.style.setProperty('color', '#ffffff', 'important'));
}
document.querySelectorAll('#ui button, #tower-menu button, #ability-menu button, #action-menu button, #tower-context-menu button, #start-panel button').forEach(wireButtonHoverColor);

loop();
</script>
</body>
</html>
